<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain is Pain — Tournament Season</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0c0b;--surface:#1a1714;--surface2:#242019;--border:#3a3228;--text:#f0e6d6;--muted:#8a7e6e;--gold:#d4a843;--gold-dim:#b8922e;--red:#c9413b;--red-bright:#e85550;--green:#4caf6a;--blue:#4a8cc9;--orange:#d98a3b;--purple:#9b6dcc;--cyan:#5bbfbf;--font:'Outfit',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);color:var(--text);font-family:var(--font)}
body{min-height:100vh}

header{background:linear-gradient(135deg,#1a0a08,#2a1510,#1a0a08);border-bottom:2px solid var(--gold-dim);padding:24px 32px 20px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(212,168,67,.03) 60px,rgba(212,168,67,.03) 61px)}
header h1{font-size:2.2rem;font-weight:900;letter-spacing:-1px;position:relative;background:linear-gradient(to right,var(--gold),#f0d078,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{font-size:.8rem;color:var(--muted);margin-top:3px;position:relative;letter-spacing:2px;text-transform:uppercase}
header .info{font-size:.72rem;color:var(--gold);font-weight:600;margin-top:5px;position:relative;font-family:var(--mono)}

nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto}
nav button{flex:0 0 auto;padding:13px 15px;background:none;border:none;color:var(--muted);font-family:var(--font);font-size:.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
nav button:hover{color:var(--text);background:rgba(212,168,67,.05)}
nav button.active{color:var(--gold);border-bottom-color:var(--gold)}

.tab{display:none;padding:20px;max-width:1060px;margin:0 auto}
.tab.active{display:block}

.btn{padding:10px 24px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0e0c0b;font-family:var(--font);font-size:.82rem;font-weight:700;border:none;border-radius:7px;cursor:pointer;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,168,67,.25)}
.btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-sm{padding:7px 16px;font-size:.75rem}
.btn-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold)}
.btn-outline:hover{background:rgba(212,168,67,.1)}
.btn-reset{background:transparent;border:1px solid var(--red);color:var(--red-bright)}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}

.section-title{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border)}

table.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
table.tbl th{text-align:left;padding:8px 10px;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
table.tbl td{padding:8px 10px;border-bottom:1px solid rgba(58,50,40,.35);vertical-align:middle}
table.tbl tr:hover td{background:rgba(212,168,67,.03)}
.pos{font-family:var(--mono);font-weight:700;color:var(--muted);width:28px}
.val{font-family:var(--mono);color:var(--gold);font-weight:600}
.mono{font-family:var(--mono)}
.delta-pos{color:var(--green)}.delta-neg{color:var(--red-bright)}

.tier-gs{background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.25)}
.tier-2{background:rgba(74,140,201,.1);color:var(--blue);border:1px solid rgba(74,140,201,.2)}
.tier-3{background:rgba(155,109,204,.1);color:var(--purple);border:1px solid rgba(155,109,204,.2)}
.tier-4{background:rgba(91,191,191,.08);color:var(--cyan);border:1px solid rgba(91,191,191,.18)}
.tier-lo{background:rgba(138,126,110,.08);color:var(--muted);border:1px solid rgba(138,126,110,.18)}
.tier-badge{display:inline-flex;font-size:.58rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:4px}

.tourn-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.tourn-card.active-t{border-color:var(--gold)}
.tourn-card.done-t{border-color:rgba(76,175,106,.2)}
.tourn-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.tourn-name{font-weight:700;font-size:.9rem}
.tourn-meta{font-family:var(--mono);font-size:.65rem;color:var(--muted)}
.tourn-body{padding:0 16px 12px;font-size:.8rem}
.match-line{padding:5px 0;border-bottom:1px solid rgba(58,50,40,.25);display:flex;justify-content:space-between;align-items:center;font-size:.78rem}
.match-line .mw{font-weight:600;color:var(--green)}.match-line .ml{color:var(--muted)}
.match-line .roll-info{font-family:var(--mono);font-size:.65rem;color:var(--muted)}

.day-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.day-nav h2{font-size:1.2rem;font-weight:800}
.day-badge{font-family:var(--mono);font-size:.72rem;background:var(--surface2);color:var(--gold);padding:5px 12px;border-radius:18px;border:1px solid var(--border)}

.banner{padding:12px 18px;border-radius:7px;margin-bottom:14px;font-size:.82rem;font-weight:500}
.banner-gold{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);color:var(--gold)}
.banner-green{background:rgba(76,175,106,.08);border:1px solid rgba(76,175,106,.2);color:var(--green)}
.banner-blue{background:rgba(74,140,201,.08);border:1px solid rgba(74,140,201,.2);color:var(--blue)}

.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(24px,1fr));gap:2px}
.cal-cell{width:100%;aspect-ratio:1;border-radius:3px;font-size:.45rem;display:flex;align-items:center;justify-content:center;font-family:var(--mono);cursor:default;transition:all .1s}
.cal-cell.empty{background:var(--surface)}
.cal-cell.has-t{background:var(--surface2);color:var(--muted)}
.cal-cell.top12{background:rgba(212,168,67,.15);color:var(--gold)}
.cal-cell.today{outline:2px solid var(--gold)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease both}
</style>
</head>
<body>

<header>
  <h1>Spain is Pain</h1>
  <div class="sub">Tournament Season · 365 Days</div>
  <div class="info" id="h-info">Loading teams...</div>
</header>

<nav>
  <button class="active" onclick="showTab('season')">Season</button>
  <button onclick="showTab('calendar')">Calendar</button>
  <button onclick="showTab('rankings')">Rankings</button>
  <button onclick="showTab('tournaments')">Tournaments</button>
  <button onclick="showTab('teams')">Teams</button>
</nav>

<div id="tab-season" class="tab active"></div>
<div id="tab-calendar" class="tab"></div>
<div id="tab-rankings" class="tab"></div>
<div id="tab-tournaments" class="tab"></div>
<div id="tab-teams" class="tab"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJa_oKMLmu1yBLvWDnnuXnb3UduuQIdOrewmqW74XZM3r1VJZR3gO9uHd2GeRaS6vwCxkch0rPdFz/pub?gid=738693130&single=true&output=csv';
const SAVE_KEY='sip_tournament_v1';
const TOP12_COOLING=7;
const SEASON_DAYS=365;

// Tier definitions: [maxHostRank, teamCount, days, label, cssClass]
const TIERS=[
  [4,32,5,'Grand Slam','tier-gs'],
  [12,32,5,'Level 2','tier-2'],
  [28,16,4,'Level 3','tier-3'],
  [60,16,4,'Level 4','tier-4'],
  [124,16,4,'Level 5','tier-lo'],
  [252,16,4,'Level 6','tier-lo'],
  [508,16,4,'Level 7','tier-lo'],
  [9999,16,4,'Level 8','tier-lo'],
];

// Points per tier: [winner, runner-up, 3rd, 4th, QF losers, R16 losers]
const POINTS={
  'Grand Slam':[2000,1000,600,400,200,100],
  'Level 2':[1000,500,300,200,100,50],
  'Level 3':[400,200,120,80,40,0],
  'Level 4':[200,100,60,40,20,0],
  'Level 5':[100,50,30,20,10,0],
  'Level 6':[50,25,15,10,5,0],
  'Level 7':[25,12,8,5,2,0],
  'Level 8':[10,5,3,2,1,0],
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let allTeams=[];        // [{name,comunidad,provincia,value,startValue}]
let tournaments=[];     // [{id,hostIdx,tier,label,css,teamCount,days,startDay,teams:[],bracket:[],results:{},winner,runnerUp,third,fourth,complete}]
let calendar=[];        // day 1-365 → [tournamentIds active that day]
let currentDay=0;       // 0 = not started, 1-365
let points={};          // {teamIdx: totalPoints}
let teamStats={};       // {teamIdx: {played,wins,losses,tourneys,tourneysPlayed}}
let seasonComplete=false;

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function fmt(n){return n.toLocaleString('es-ES')}
function randInt(a,b){return a+Math.floor(Math.random()*(b-a+1))}

// ═══════════════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════════════
function parseCSVRow(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c=''}else c+=ch}
  r.push(c.trim());return r;
}
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.replace(/\r/g,'').trim()).filter(l=>l);
  if(lines.length<2)return[];
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=parseCSVRow(lines[i]);
    if(c.length>=4){
      const val=parseInt(c[3].replace(/[.,\s"]/g,''),10);
      if(!isNaN(val))rows.push({comunidad:c[0].replace(/"/g,''),provincia:c[1].replace(/"/g,''),name:c[2].replace(/"/g,''),value:val});
    }
  }
  return rows.sort((a,b)=>b.value-a.value);
}

// ═══════════════════════════════════════════════════════════════
// TIER CLASSIFICATION
// ═══════════════════════════════════════════════════════════════
function getTier(hostRank){
  for(const[maxR,tc,days,label,css]of TIERS){
    if(hostRank<=maxR)return{teamCount:tc,days,label,css};
  }
  return{teamCount:16,days:4,label:'Level 8',css:'tier-lo'};
}

function isTop12(t){return t.label==='Grand Slam'||t.label==='Level 2'}

// ═══════════════════════════════════════════════════════════════
// CALENDAR GENERATION
// ═══════════════════════════════════════════════════════════════
function buildCalendar(){
  calendar=Array.from({length:SEASON_DAYS+1},()=>[]);

  // 1) Place Top 12 tournaments (no overlap, 7-day cooling, spread across season)
  const top12=tournaments.filter(t=>isTop12(t));
  const spacing=Math.floor(SEASON_DAYS/(top12.length+1));
  let nextAvail=spacing;
  // Interleave GS and L2: GS1, L2-1, L2-2, GS2, L2-3, L2-4, GS3, L2-5, L2-6, GS4, L2-7, L2-8
  const gs=top12.filter(t=>t.label==='Grand Slam');
  const l2=top12.filter(t=>t.label==='Level 2');
  const ordered=[];
  let gi=0,li=0;
  for(let i=0;i<12;i++){
    if(i%3===0&&gi<gs.length)ordered.push(gs[gi++]);
    else if(li<l2.length)ordered.push(l2[li++]);
    else if(gi<gs.length)ordered.push(gs[gi++]);
  }

  nextAvail=14; // start after 2 weeks
  ordered.forEach(t=>{
    t.startDay=nextAvail;
    for(let d=0;d<t.days;d++)calendar[nextAvail+d].push(t.id);
    nextAvail+=t.days+TOP12_COOLING;
  });

  // 2) Place remaining tournaments, avoiding same-province overlap, spreading evenly
  const rest=tournaments.filter(t=>!isTop12(t));
  // Shuffle to avoid patterns, then sort by tier (higher tiers earlier)
  rest.sort((a,b)=>{
    const ta=TIERS.findIndex(([mr])=>a.hostIdx<mr);
    const tb=TIERS.findIndex(([mr])=>b.hostIdx<mr);
    return ta-tb||Math.random()-0.5;
  });

  rest.forEach(t=>{
    let bestDay=1,bestScore=Infinity;
    // Try each possible start day, pick the one with least conflicts
    for(let d=1;d<=SEASON_DAYS-t.days+1;d++){
      // Can't overlap with top 12 cooling periods
      let blocked=false;
      for(let dd=0;dd<t.days;dd++){
        const dayTourns=calendar[d+dd];
        // Check if any top12 is running or cooling
        if(dayTourns.some(tid=>{const ot=tournaments[tid];return isTop12(ot)})){blocked=true;break}
      }
      if(blocked)continue;

      // Score: penalize same-province/comunidad overlap, prefer even distribution
      let score=0;
      for(let dd=0;dd<t.days;dd++){
        calendar[d+dd].forEach(tid=>{
          const ot=tournaments[tid];
          if(allTeams[ot.hostIdx].provincia===allTeams[t.hostIdx].provincia)score+=100;
          else if(allTeams[ot.hostIdx].comunidad===allTeams[t.hostIdx].comunidad)score+=30;
          score+=1; // slight penalty for busy days
        });
      }
      if(score<bestScore){bestScore=score;bestDay=d}
    }
    t.startDay=bestDay;
    for(let d=0;d<t.days;d++)calendar[bestDay+d].push(t.id);
  });
}

// ═══════════════════════════════════════════════════════════════
// TEAM SELECTION FOR TOURNAMENTS
// ═══════════════════════════════════════════════════════════════
function getRankedTeams(){
  return allTeams.map((_,i)=>i).sort((a,b)=>(points[b]||0)-(points[a]||0)||allTeams[b].value-allTeams[a].value);
}

function selectTeams(tourn){
  const host=allTeams[tourn.hostIdx];
  const ranked=getRankedTeams();
  const n=tourn.teamCount;

  // Check availability: team can't be in another active tournament
  function isAvail(tIdx){
    if(!teamStats[tIdx])teamStats[tIdx]={played:0,wins:0,losses:0,tourneysPlayed:0,busyUntil:0};
    return teamStats[tIdx].busyUntil<tourn.startDay;
  }

  // For top 12: check cooling — team must not be in a tournament ending within 7 days before
  function isAvailTop12(tIdx){
    if(!isAvail(tIdx))return false;
    // Also check if team has a tournament ending within cooling period before this one
    const coolStart=tourn.startDay-TOP12_COOLING;
    return(teamStats[tIdx].busyUntil||0)<=coolStart;
  }

  const availFn=isTop12(tourn)?isAvailTop12:isAvail;
  const selected=new Set();
  selected.add(tourn.hostIdx); // host always participates

  if(tourn.label==='Grand Slam'){
    // Top 32 ranked available teams
    for(const tIdx of ranked){
      if(selected.size>=n)break;
      if(!selected.has(tIdx)&&availFn(tIdx))selected.add(tIdx);
    }
  }else if(tourn.label==='Level 2'){
    // Top 24 available + 8 regional invites
    let mainCount=0;
    for(const tIdx of ranked){
      if(selected.size>=n)break;
      if(mainCount>=24)break;
      if(!selected.has(tIdx)&&availFn(tIdx)){selected.add(tIdx);mainCount++}
    }
    // Regional invites: teams from host's comunidad not yet selected
    const regional=ranked.filter(i=>allTeams[i].comunidad===host.comunidad&&!selected.has(i)&&availFn(i));
    regional.forEach(tIdx=>{if(selected.size<n)selected.add(tIdx)});
    // Fill remaining with any available
    for(const tIdx of ranked){
      if(selected.size>=n)break;
      if(!selected.has(tIdx)&&availFn(tIdx))selected.add(tIdx);
    }
  }else{
    // 8 local (same provincia/comunidad) + 8 random (fewest tournaments, with region affinity)
    const local=ranked.filter(i=>
      (allTeams[i].provincia===host.provincia||allTeams[i].comunidad===host.comunidad)
      &&!selected.has(i)&&isAvail(i)
    );
    local.slice(0,7).forEach(tIdx=>selected.add(tIdx)); // 7 + host = 8 local

    // Random: sort by fewest tourneys played, with affinity for region
    const candidates=ranked.filter(i=>!selected.has(i)&&isAvail(i));
    candidates.sort((a,b)=>{
      const sa=teamStats[a]?.tourneysPlayed||0,sb=teamStats[b]?.tourneysPlayed||0;
      if(sa!==sb)return sa-sb;
      // Affinity: same region teams get slight priority
      const aa=allTeams[a].comunidad===host.comunidad?-1:0;
      const ab=allTeams[b].comunidad===host.comunidad?-1:0;
      return aa-ab||Math.random()-0.5;
    });
    candidates.slice(0,n-selected.size).forEach(tIdx=>selected.add(tIdx));
  }

  // Convert to array, seed by ranking (best ranked = seed 1)
  const teamArr=[...selected];
  teamArr.sort((a,b)=>(points[b]||0)-(points[a]||0)||allTeams[b].value-allTeams[a].value);

  // Mark teams as busy
  teamArr.forEach(tIdx=>{
    if(!teamStats[tIdx])teamStats[tIdx]={played:0,wins:0,losses:0,tourneysPlayed:0,busyUntil:0};
    teamStats[tIdx].busyUntil=tourn.startDay+tourn.days-1;
    teamStats[tIdx].tourneysPlayed++;
  });

  tourn.teams=teamArr;
  // Build seeded bracket (1v16, 8v9, 5v12, 4v13, etc.)
  tourn.bracket=buildBracket(teamArr);
}

function buildBracket(teams){
  const n=teams.length;
  // Standard seeding for elimination bracket
  if(n===32){
    const seeds=[1,32,16,17,8,25,9,24,4,29,13,20,5,28,12,21,2,31,15,18,7,26,10,23,3,30,14,19,6,27,11,22];
    return seeds.map(s=>teams[s-1]!==undefined?teams[s-1]:null);
  }
  if(n===16){
    const seeds=[1,16,8,9,4,13,5,12,2,15,7,10,3,14,6,11];
    return seeds.map(s=>teams[s-1]!==undefined?teams[s-1]:null);
  }
  return teams;
}

// ═══════════════════════════════════════════════════════════════
// MATCH ENGINE
// ═══════════════════════════════════════════════════════════════
function simulateMatch(idx1,idx2){
  const t1=allTeams[idx1],t2=allTeams[idx2];
  const best=Math.max(t1.value,t2.value),worst=Math.min(t1.value,t2.value);
  const ratio=worst/best;
  const threshold=Math.floor(ratio*100);
  const roll=Math.floor(Math.random()*200)+1;
  const worstWins=roll<=threshold;
  const bestIdx=t1.value>=t2.value?idx1:idx2;
  const worstIdx=t1.value>=t2.value?idx2:idx1;
  const winnerIdx=worstWins?worstIdx:bestIdx;
  const loserIdx=winnerIdx===idx1?idx2:idx1;
  // Steal
  let stolen=0,stealBlocked=false;
  const lr=allTeams[loserIdx].value/allTeams[winnerIdx].value;
  if(lr>0.5){stolen=Math.round(allTeams[loserIdx].value*0.1);allTeams[winnerIdx].value+=stolen;allTeams[loserIdx].value-=stolen}
  else stealBlocked=true;
  // Stats
  if(!teamStats[winnerIdx])teamStats[winnerIdx]={played:0,wins:0,losses:0,tourneysPlayed:0,busyUntil:0};
  if(!teamStats[loserIdx])teamStats[loserIdx]={played:0,wins:0,losses:0,tourneysPlayed:0,busyUntil:0};
  teamStats[winnerIdx].played++;teamStats[winnerIdx].wins++;
  teamStats[loserIdx].played++;teamStats[loserIdx].losses++;
  return{idx1,idx2,winnerIdx,loserIdx,roll,threshold,worstWins,stolen,stealBlocked,
    name1:t1.name,name2:t2.name,winnerName:allTeams[winnerIdx].name,loserName:allTeams[loserIdx].name};
}

// ═══════════════════════════════════════════════════════════════
// TOURNAMENT ROUND SIM
// ═══════════════════════════════════════════════════════════════
function getTournamentRound(tourn){
  // How many rounds completed?
  const totalRounds=tourn.teamCount===32?5:4;
  const roundsDone=Object.keys(tourn.results).length;
  return roundsDone; // 0-indexed
}

function simTournamentDay(tourn){
  const roundIdx=getTournamentRound(tourn);
  const n=tourn.teamCount;
  const totalRounds=n===32?5:4;
  if(roundIdx>=totalRounds)return; // already done

  // Get current alive teams from bracket progression
  let alive=tourn.bracket.filter(t=>t!==null);
  // Apply previous results to narrow down
  for(let r=0;r<roundIdx;r++){
    const rr=tourn.results[r];
    if(rr)alive=rr.map(m=>m.winnerIdx);
  }

  const roundName=roundIdx===totalRounds-1?'Final':roundIdx===totalRounds-2?'Semifinal':roundIdx===totalRounds-3?'Quarterfinal':'Round '+(roundIdx+1);

  // Pair up
  const matches=[];
  for(let i=0;i<alive.length;i+=2){
    if(i+1<alive.length){
      matches.push(simulateMatch(alive[i],alive[i+1]));
    }
  }

  tourn.results[roundIdx]={matches,roundName};

  // Bronze match: after semifinals (round totalRounds-2), the two losers play
  if(roundIdx===totalRounds-2){
    const sfLosers=matches.map(m=>m.loserIdx);
    if(sfLosers.length===2){
      const bronze=simulateMatch(sfLosers[0],sfLosers[1]);
      tourn.results['bronze']={matches:[bronze],roundName:'Bronze Match'};
      tourn.third=bronze.winnerIdx;
      tourn.fourth=bronze.loserIdx;
    }
  }

  // After final
  if(roundIdx===totalRounds-1&&matches.length>0){
    tourn.winner=matches[0].winnerIdx;
    tourn.runnerUp=matches[0].loserIdx;
    tourn.complete=true;
    awardPoints(tourn);
    // Free eliminated teams
    tourn.teams.forEach(tIdx=>{
      if(teamStats[tIdx])teamStats[tIdx].busyUntil=0;
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// POINTS
// ═══════════════════════════════════════════════════════════════
function awardPoints(tourn){
  const pts=POINTS[tourn.label]||[10,5,3,2,1,0];
  if(tourn.winner!=null){points[tourn.winner]=(points[tourn.winner]||0)+pts[0]}
  if(tourn.runnerUp!=null){points[tourn.runnerUp]=(points[tourn.runnerUp]||0)+pts[1]}
  if(tourn.third!=null){points[tourn.third]=(points[tourn.third]||0)+pts[2]}
  if(tourn.fourth!=null){points[tourn.fourth]=(points[tourn.fourth]||0)+pts[3]}
  // QF losers (round totalRounds-3)
  const totalR=tourn.teamCount===32?5:4;
  const qfRound=tourn.results[totalR-3];
  if(qfRound){
    qfRound.matches.forEach(m=>{
      if(m.loserIdx!==tourn.third&&m.loserIdx!==tourn.fourth){
        points[m.loserIdx]=(points[m.loserIdx]||0)+pts[4];
      }
    });
  }
  // R16 losers (only for 32-team)
  if(tourn.teamCount===32){
    const r16=tourn.results[0];
    if(r16){r16.matches.forEach(m=>{points[m.loserIdx]=(points[m.loserIdx]||0)+pts[5]})}
  }
}

// ═══════════════════════════════════════════════════════════════
// SEASON SIM
// ═══════════════════════════════════════════════════════════════
function advanceDay(){
  if(currentDay>=SEASON_DAYS){seasonComplete=true;return}
  currentDay++;
  const todayTournIds=calendar[currentDay]||[];

  todayTournIds.forEach(tid=>{
    const t=tournaments[tid];
    if(t.complete)return;
    // If tournament hasn't started yet (first day), select teams
    if(!t.teams||t.teams.length===0){
      selectTeams(t);
    }
    // Sim one round
    simTournamentDay(t);
  });

  if(currentDay>=SEASON_DAYS)seasonComplete=true;
  saveState();
}

function advanceDays(n){for(let i=0;i<n&&!seasonComplete;i++)advanceDay()}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function initSeason(){
  document.getElementById('h-info').textContent='Fetching teams...';
  let csvData;
  try{
    const r=await fetch(CSV_URL);
    const text=await r.text();
    csvData=parseCSV(text);
  }catch(e){
    document.getElementById('h-info').textContent='⚠️ Could not fetch teams. Check connection.';
    return;
  }
  if(!csvData||csvData.length<8){
    document.getElementById('h-info').textContent='⚠️ Not enough teams in sheet ('+((csvData||[]).length)+')';
    return;
  }
  allTeams=csvData.map(t=>({...t,startValue:t.value}));

  // Create tournaments
  tournaments=allTeams.map((t,i)=>{
    const tier=getTier(i+1);
    return{id:i,hostIdx:i,tier:tier.label,label:tier.label,css:tier.css,
      teamCount:tier.teamCount,days:tier.days,startDay:0,
      teams:[],bracket:[],results:{},winner:null,runnerUp:null,third:null,fourth:null,complete:false};
  });

  // Build calendar
  buildCalendar();

  // Reset state
  currentDay=0;points={};teamStats={};seasonComplete=false;
  document.getElementById('h-info').textContent=`${allTeams.length} teams · ${tournaments.length} tournaments · Ready`;
  saveState();
  renderAll();
}

function resetSeason(){
  localStorage.removeItem(SAVE_KEY);
  initSeason();
}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function saveState(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({allTeams,tournaments,calendar,currentDay,points,teamStats,seasonComplete}));
  }catch(e){console.warn('Save failed',e)}
}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const s=JSON.parse(raw);
    allTeams=s.allTeams||[];tournaments=s.tournaments||[];calendar=s.calendar||[];
    currentDay=s.currentDay||0;points=s.points||{};teamStats=s.teamStats||{};seasonComplete=s.seasonComplete||false;
    return allTeams.length>0;
  }catch(e){return false}
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelector(`nav button[onclick="showTab('${id}')"]`).classList.add('active');
}
function renderAll(){renderSeason();renderCalendar();renderRankings();renderTournaments();renderTeams();
  document.getElementById('h-info').textContent=`Day ${currentDay}/${SEASON_DAYS} · ${allTeams.length} teams · ${tournaments.filter(t=>t.complete).length}/${tournaments.length} done`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: SEASON
// ═══════════════════════════════════════════════════════════════
function renderSeason(){
  const el=document.getElementById('tab-season');
  let h='';

  h+=`<div class="controls">`;
  if(!seasonComplete){
    h+=`<button class="btn" onclick="advanceDay();renderAll()">▶ Next Day</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="advanceDays(7);renderAll()">+7 Days</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="advanceDays(30);renderAll()">+30 Days</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="advanceDays(365);renderAll()">Sim All</button>`;
  }else{
    h+=`<div class="banner banner-gold">🏆 Season Complete!</div>`;
  }
  h+=`<button class="btn btn-reset btn-sm" onclick="resetSeason()" style="margin-left:auto">Reset</button>`;
  h+=`</div>`;

  h+=`<div class="day-nav">
    <h2>Day ${currentDay}</h2>
    <span class="day-badge">${tournaments.filter(t=>t.complete).length} tournaments complete</span>
  </div>`;

  // Today's active tournaments
  const todayIds=(calendar[currentDay]||[]);
  const activeTourns=todayIds.map(id=>tournaments[id]).filter(t=>t&&t.teams&&t.teams.length>0);

  if(activeTourns.length>0){
    h+=`<div class="section-title">Active Today (${activeTourns.length})</div>`;
    activeTourns.forEach(t=>{h+=renderTournCard(t,true)});
  }

  // Recently completed
  const recent=tournaments.filter(t=>t.complete&&t.startDay+t.days>=currentDay-3).slice(0,8);
  if(recent.length){
    h+=`<div class="section-title">Recently Completed</div>`;
    recent.forEach(t=>{h+=renderTournCard(t,false)});
  }

  // Upcoming
  const upcoming=tournaments.filter(t=>!t.complete&&t.startDay>currentDay&&t.startDay<=currentDay+7).slice(0,6);
  if(upcoming.length){
    h+=`<div class="section-title">Upcoming (next 7 days)</div>`;
    upcoming.forEach(t=>{
      h+=`<div class="tourn-card">
        <div class="tourn-header">
          <span class="tourn-name"><span class="tier-badge ${t.css}">${t.label}</span> ${allTeams[t.hostIdx].name}</span>
          <span class="tourn-meta">Day ${t.startDay} · ${t.teamCount} teams · ${t.days}d</span>
        </div>
      </div>`;
    });
  }

  el.innerHTML=h;
}

function renderTournCard(t,showLatest){
  const host=allTeams[t.hostIdx];
  const totalR=t.teamCount===32?5:4;
  const roundsDone=Object.keys(t.results).filter(k=>k!=='bronze').length;
  let h=`<div class="tourn-card ${t.complete?'done-t':'active-t'} fade-in">
    <div class="tourn-header">
      <span class="tourn-name"><span class="tier-badge ${t.css}">${t.label}</span> ${host.name}</span>
      <span class="tourn-meta">${t.complete?'🏆 '+allTeams[t.winner].name:'R'+roundsDone+'/'+totalR} · Day ${t.startDay}</span>
    </div>`;

  // Show latest round results
  if(showLatest||t.complete){
    const lastRound=t.results[roundsDone-1]||t.results[totalR-1];
    const bronze=t.results['bronze'];
    h+=`<div class="tourn-body">`;
    if(lastRound){
      h+=`<div style="font-size:.7rem;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:1px">${lastRound.roundName}</div>`;
      lastRound.matches.forEach(m=>{
        h+=`<div class="match-line">
          <span><span class="mw">${m.winnerName}</span> def. <span class="ml">${m.loserName}</span></span>
          <span class="roll-info">${m.roll}/${m.threshold}${m.worstWins?' 🎲':''}${m.stealBlocked?'':' ±'+fmt(m.stolen)}</span>
        </div>`;
      });
    }
    if(bronze){
      h+=`<div style="font-size:.7rem;color:var(--muted);margin:6px 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Bronze</div>`;
      bronze.matches.forEach(m=>{
        h+=`<div class="match-line"><span><span class="mw">${m.winnerName}</span> def. <span class="ml">${m.loserName}</span></span><span class="roll-info">${m.roll}/${m.threshold}</span></div>`;
      });
    }
    if(t.complete){
      const pts=POINTS[t.label]||[];
      h+=`<div style="margin-top:8px;font-size:.72rem;color:var(--muted)">🥇 ${allTeams[t.winner].name} (+${pts[0]}) · 🥈 ${allTeams[t.runnerUp].name} (+${pts[1]})${t.third!=null?' · 🥉 '+allTeams[t.third].name+' (+'+pts[2]+')':''}</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: CALENDAR
// ═══════════════════════════════════════════════════════════════
function renderCalendar(){
  const el=document.getElementById('tab-calendar');
  let h=`<div class="section-title">Season Calendar · ${SEASON_DAYS} days</div>`;
  h+=`<div class="cal-grid">`;
  for(let d=1;d<=SEASON_DAYS;d++){
    const tIds=calendar[d]||[];
    const hasTop12=tIds.some(id=>isTop12(tournaments[id]));
    const cls=d===currentDay?'today ':'';
    const cls2=tIds.length===0?'empty':hasTop12?'top12':'has-t';
    h+=`<div class="cal-cell ${cls}${cls2}" title="Day ${d}: ${tIds.length} tournaments">${tIds.length||''}</div>`;
  }
  h+=`</div>`;

  // Legend
  h+=`<div style="display:flex;gap:16px;margin-top:12px;font-size:.7rem;color:var(--muted)">
    <span>⬜ Empty</span><span style="color:var(--muted)">▪ Active</span><span style="color:var(--gold)">▪ Top 12</span><span>🔲 Today</span>
  </div>`;

  // Top 12 schedule
  h+=`<div class="section-title">Top 12 Schedule</div>`;
  const top12=tournaments.filter(t=>isTop12(t)).sort((a,b)=>a.startDay-b.startDay);
  top12.forEach(t=>{
    h+=`<div style="font-size:.8rem;padding:4px 0;border-bottom:1px solid rgba(58,50,40,.25)">
      <span class="tier-badge ${t.css}" style="margin-right:6px">${t.label}</span>
      <b>${allTeams[t.hostIdx].name}</b> · Day ${t.startDay}–${t.startDay+t.days-1}
      ${t.complete?' · 🏆 '+allTeams[t.winner].name:''}
    </div>`;
  });
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: RANKINGS
// ═══════════════════════════════════════════════════════════════
function renderRankings(){
  const el=document.getElementById('tab-rankings');
  const ranked=getRankedTeams().slice(0,100);
  let h=`<div class="section-title">Top 100 Rankings</div>`;
  h+=`<table class="tbl"><thead><tr><th>#</th><th>Team</th><th>Comunidad</th><th>Value</th><th>Pts</th><th>W</th><th>L</th><th>T</th></tr></thead><tbody>`;
  ranked.forEach((tIdx,i)=>{
    const t=allTeams[tIdx],s=teamStats[tIdx]||{};
    h+=`<tr><td class="pos">${i+1}</td><td style="font-weight:600">${t.name}</td>
      <td style="font-size:.74rem;color:var(--muted)">${t.comunidad}</td>
      <td class="val">${fmt(t.value)}</td>
      <td class="mono" style="color:var(--gold)">${points[tIdx]||0}</td>
      <td class="mono" style="color:var(--green)">${s.wins||0}</td>
      <td class="mono" style="color:var(--red-bright)">${s.losses||0}</td>
      <td class="mono" style="color:var(--muted)">${s.tourneysPlayed||0}</td></tr>`;
  });
  h+=`</tbody></table>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: TOURNAMENTS
// ═══════════════════════════════════════════════════════════════
function renderTournaments(){
  const el=document.getElementById('tab-tournaments');
  let h='';
  const tiers=['Grand Slam','Level 2','Level 3','Level 4','Level 5','Level 6','Level 7','Level 8'];
  tiers.forEach(tier=>{
    const tt=tournaments.filter(t=>t.label===tier);
    if(!tt.length)return;
    const done=tt.filter(t=>t.complete).length;
    h+=`<div class="section-title">${tier} (${done}/${tt.length} complete)</div>`;
    tt.sort((a,b)=>a.startDay-b.startDay).slice(0,20).forEach(t=>{
      const host=allTeams[t.hostIdx];
      h+=`<div style="font-size:.8rem;padding:5px 0;border-bottom:1px solid rgba(58,50,40,.25)">
        <span class="tier-badge ${t.css}" style="margin-right:4px">${tier.substring(0,3)}</span>
        <b>${host.name}</b> <span style="color:var(--muted)">${host.comunidad}</span>
        · Day ${t.startDay}–${t.startDay+t.days-1}
        ${t.complete?' · 🏆 '+allTeams[t.winner].name+' | 🥈 '+allTeams[t.runnerUp].name:''}
      </div>`;
    });
    if(tt.length>20)h+=`<div style="font-size:.75rem;color:var(--muted);padding:4px 0">+ ${tt.length-20} more...</div>`;
  });
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: TEAMS
// ═══════════════════════════════════════════════════════════════
function renderTeams(){
  const el=document.getElementById('tab-teams');
  const sorted=[...allTeams.keys()].sort((a,b)=>allTeams[b].value-allTeams[a].value);
  let h=`<div class="section-title">All Teams (${allTeams.length}) — sorted by value</div>`;
  h+=`<table class="tbl"><thead><tr><th>#</th><th>Team</th><th>Comunidad</th><th>Provincia</th><th>Value</th><th>Δ</th><th>Tournament</th></tr></thead><tbody>`;
  sorted.slice(0,100).forEach((tIdx,i)=>{
    const t=allTeams[tIdx],delta=t.value-t.startValue;
    const tier=getTier(tIdx+1);
    h+=`<tr><td class="pos">${i+1}</td><td style="font-weight:600">${t.name}</td>
      <td style="font-size:.74rem;color:var(--muted)">${t.comunidad}</td>
      <td style="font-size:.74rem;color:var(--muted)">${t.provincia}</td>
      <td class="val">${fmt(t.value)}</td>
      <td class="mono ${delta>=0?'delta-pos':'delta-neg'}" style="font-size:.72rem">${delta>=0?'+':''}${fmt(delta)}</td>
      <td><span class="tier-badge ${tier.css}">${tier.label}</span></td></tr>`;
  });
  h+=`</tbody></table>`;
  if(allTeams.length>100)h+=`<div style="font-size:.75rem;color:var(--muted);margin-top:8px">Showing top 100 of ${allTeams.length}</div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
if(loadState()){
  renderAll();
}else{
  initSeason();
}
</script>

</html>
