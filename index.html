<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain is Pain — Belt Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0c0b;
  --surface: #1a1714;
  --surface2: #242019;
  --border: #3a3228;
  --text: #f0e6d6;
  --muted: #8a7e6e;
  --gold: #d4a843;
  --gold-dim: #b8922e;
  --red: #c9413b;
  --red-bright: #e85550;
  --green: #4caf6a;
  --green-dim: #2d7a42;
  --blue: #4a8cc9;
  --orange: #d98a3b;
  --purple: #9b6dcc;
  --font: 'Outfit', sans-serif;
  --mono: 'Space Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { background: var(--bg); color: var(--text); font-family: var(--font); }
body { min-height:100vh; }

header {
  background: linear-gradient(135deg, #1a0a08 0%, #2a1510 50%, #1a0a08 100%);
  border-bottom: 2px solid var(--gold-dim);
  padding: 28px 32px 24px; position: relative; overflow: hidden;
}
header::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(212,168,67,0.03) 60px, rgba(212,168,67,0.03) 61px);
}
header h1 {
  font-size:2.4rem; font-weight:900; letter-spacing:-1px; position:relative;
  background:linear-gradient(to right,var(--gold),#f0d078,var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
header .subtitle {
  font-size:.85rem; color:var(--muted); font-weight:400;
  margin-top:4px; position:relative; letter-spacing:2px; text-transform:uppercase;
}

nav {
  display:flex; background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
nav button {
  flex:1; padding:14px 16px; background:none; border:none;
  color:var(--muted); font-family:var(--font); font-size:.82rem;
  font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
  cursor:pointer; border-bottom:2px solid transparent; transition:all .2s;
}
nav button:hover { color:var(--text); background:rgba(212,168,67,0.05); }
nav button.active { color:var(--gold); border-bottom-color:var(--gold); }

.tab { display:none; padding:24px; max-width:960px; margin:0 auto; }
.tab.active { display:block; }

.btn {
  padding:12px 28px;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  color:#0e0c0b; font-family:var(--font); font-size:.85rem; font-weight:700;
  border:none; border-radius:8px; cursor:pointer; letter-spacing:.5px; transition:all .15s;
}
.btn:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(212,168,67,0.25); }
.btn:disabled { opacity:.35; cursor:default; transform:none; box-shadow:none; }
.btn-sm { padding:8px 18px; font-size:.78rem; }
.btn-outline { background:transparent; border:1px solid var(--gold-dim); color:var(--gold); }
.btn-outline:hover { background:rgba(212,168,67,0.1); }
.btn-reset { background:transparent; border:1px solid var(--red); color:var(--red-bright); }
.btn-reset:hover { background:rgba(201,65,59,0.1); }
.controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }

table.standings { width:100%; border-collapse:collapse; font-size:.85rem; }
table.standings th {
  text-align:left; padding:10px 12px; font-size:.7rem;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
  border-bottom:1px solid var(--border);
}
table.standings td { padding:10px 12px; border-bottom:1px solid rgba(58,50,40,0.4); vertical-align:middle; }
table.standings tr:hover td { background:rgba(212,168,67,0.03); }
.pos { font-family:var(--mono); font-weight:700; color:var(--muted); width:32px; }
.team-name { font-weight:600; }
.val { font-family:var(--mono); color:var(--gold); font-weight:600; }
.w { color:var(--green); }
.l { color:var(--red-bright); }
.mono { font-family:var(--mono); }
.delta-pos { color:var(--green); }
.delta-neg { color:var(--red-bright); }

.match-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  margin-bottom:12px; overflow:hidden; transition:border-color .2s;
}
.match-card.played { border-color:rgba(212,168,67,0.2); }
.match-card.current { border-color:var(--gold); box-shadow:0 0 20px rgba(212,168,67,0.1); }
.match-row {
  display:grid; grid-template-columns:1fr auto 1fr;
  align-items:center; padding:16px 20px; gap:16px;
}
.match-team { display:flex; align-items:center; gap:10px; }
.match-team.right { justify-content:flex-end; text-align:right; }
.match-team .mname { font-weight:600; font-size:.95rem; }
.match-team .mval { font-family:var(--mono); font-size:.72rem; color:var(--muted); }
.match-team .mrank { font-family:var(--mono); font-size:.65rem; color:var(--muted); }
.match-vs {
  font-family:var(--mono); font-size:.7rem; color:var(--muted);
  letter-spacing:2px; text-transform:uppercase; min-width:40px; text-align:center;
}
.match-details {
  background:var(--surface2); padding:12px 20px; font-size:.78rem;
  color:var(--muted); display:flex; gap:20px; flex-wrap:wrap;
  border-top:1px solid var(--border);
}
.match-details .tag { display:inline-flex; align-items:center; gap:5px; }
.match-details .tag b { color:var(--text); font-weight:600; }
.winner-tag {
  font-size:.65rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:3px 8px; border-radius:4px; background:rgba(76,175,106,0.15); color:var(--green);
}
.loser-tag {
  font-size:.65rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:3px 8px; border-radius:4px; background:rgba(232,85,80,0.1); color:var(--red-bright);
}

.belt-badge {
  display:inline-flex; align-items:center; gap:5px;
  font-size:.65rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:4px 10px; border-radius:5px;
}
.belt-national { background:rgba(212,168,67,0.15); color:var(--gold); border:1px solid rgba(212,168,67,0.3); }
.belt-regional { background:rgba(74,140,201,0.12); color:var(--blue); border:1px solid rgba(74,140,201,0.25); }
.belt-provincial { background:rgba(155,109,204,0.12); color:var(--purple); border:1px solid rgba(155,109,204,0.25); }

.rank-move {
  background:var(--surface2); padding:10px 20px; font-size:.75rem;
  color:var(--muted); border-top:1px solid var(--border); font-family:var(--mono);
  line-height:1.8;
}
.rank-move .mv-up { color:var(--green); }
.rank-move .mv-down { color:var(--red-bright); }
.rank-move .mv-neutral { color:var(--muted); }

.round-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.round-header h2 { font-size:1.4rem; font-weight:800; }
.round-badge {
  font-family:var(--mono); font-size:.75rem;
  background:var(--surface2); color:var(--gold);
  padding:6px 14px; border-radius:20px; border:1px solid var(--border);
}

.belts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-bottom:24px; }
.belt-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:18px 20px;
}
.belt-card .belt-type { font-size:.65rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
.belt-card .belt-name { font-size:1.1rem; font-weight:700; margin-bottom:2px; }
.belt-card .belt-holder { font-size:.85rem; color:var(--muted); }
.belt-card .belt-holder b { color:var(--text); }

.teams-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.team-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:18px 20px; position:relative; overflow:hidden;
  transition:transform .15s,border-color .2s;
}
.team-card:hover { transform:translateY(-2px); border-color:var(--gold-dim); }
.team-card .rank { position:absolute; top:12px; right:14px; font-family:var(--mono); font-size:.7rem; color:var(--muted); }
.team-card .name { font-size:1.15rem; font-weight:700; margin-bottom:2px; }
.team-card .region { font-size:.72rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.team-card .value { font-family:var(--mono); font-size:1.3rem; font-weight:700; color:var(--gold); }
.team-card .value-delta { font-family:var(--mono); font-size:.7rem; margin-left:6px; }
.team-card .bar-bg { height:6px; background:var(--surface2); border-radius:3px; margin-top:10px; overflow:hidden; }
.team-card .bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); transition:width .6s ease; }
.team-card .belt-list { margin-top:8px; display:flex; gap:4px; flex-wrap:wrap; }

.history-round { margin-bottom:24px; }
.history-round h3 { font-size:.9rem; font-weight:700; margin-bottom:8px; color:var(--gold); }
.history-match { font-size:.82rem; padding:8px 0; border-bottom:1px solid rgba(58,50,40,0.3); line-height:1.6; }
.history-match .hw { font-weight:700; color:var(--green); }
.history-match .hl { color:var(--muted); }

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn .35s ease both; }
</style>
</head>
<body>

<header>
  <h1>Spain is Pain</h1>
  <div class="subtitle">Belt Championship · 8 Teams</div>
</header>

<nav>
  <button class="active" onclick="showTab('sim')">Matchday</button>
  <button onclick="showTab('rankings')">Rankings</button>
  <button onclick="showTab('belts')">Belts</button>
  <button onclick="showTab('teams')">Teams</button>
  <button onclick="showTab('history')">History</button>
</nav>

<div id="tab-sim" class="tab active"></div>
<div id="tab-rankings" class="tab"></div>
<div id="tab-belts" class="tab"></div>
<div id="tab-teams" class="tab"></div>
<div id="tab-history" class="tab"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const INITIAL_TEAMS = [
  { name:'Madrid',    comunidad:'Madrid',          provincia:'Madrid',    value:3506730 },
  { name:'Barcelona', comunidad:'Catalunya',        provincia:'Barcelona', value:1731649 },
  { name:'Madrid II', comunidad:'Madrid',           provincia:'Madrid',    value:876683 },
  { name:'València',  comunidad:'Com. Valenciana',  provincia:'València',  value:840792 },
  { name:'Zaragoza',  comunidad:'Aragón',           provincia:'Zaragoza',  value:693091 },
  { name:'Sevilla',   comunidad:'Andalucía',        provincia:'Sevilla',   value:689423 },
  { name:'Málaga',    comunidad:'Andalucía',        provincia:'Málaga',    value:599063 },
  { name:'Murcia',    comunidad:'Murcia',           provincia:'Murcia',    value:479405 },
];

const INITIAL_BELTS = [
  { id:'spain',     level:'national',  name:'Spain 🇪🇸',    holder:null },
  { id:'andalucia', level:'regional',  name:'Andalucía',    holder:null },
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let rankings = [];
let teams = [];
let belts = [];
let roundNum = 0;
let roundMatchups = [];
let roundResults = [];
let matchCursor = 0;
let allHistory = [];
let roundActive = false;

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function fmt(n) { return n.toLocaleString('es-ES'); }
function getRank(teamIdx) { return rankings.indexOf(teamIdx) + 1; }

// ═══════════════════════════════════════════════════════════════
// MATCH ENGINE
// ═══════════════════════════════════════════════════════════════
function simulateMatch(idx1, idx2) {
  const t1 = teams[idx1], t2 = teams[idx2];
  const best = Math.max(t1.value, t2.value);
  const worst = Math.min(t1.value, t2.value);
  const ratio = worst / best;
  const threshold = Math.floor(ratio * 100);
  const roll = Math.floor(Math.random() * 200) + 1;
  const worstWins = roll <= threshold;

  const bestIdx = t1.value >= t2.value ? idx1 : idx2;
  const worstIdx = t1.value >= t2.value ? idx2 : idx1;
  const winnerIdx = worstWins ? worstIdx : bestIdx;
  const loserIdx = winnerIdx === idx1 ? idx2 : idx1;

  const preVal1 = t1.value, preVal2 = t2.value;

  // Steal: only if loser > 50% of winner
  let stolen = 0, stealBlocked = false;
  const loserRatio = teams[loserIdx].value / teams[winnerIdx].value;
  if (loserRatio > 0.5) {
    stolen = Math.round(teams[loserIdx].value * 0.1);
    teams[winnerIdx].value += stolen;
    teams[loserIdx].value -= stolen;
  } else {
    stealBlocked = true;
  }

  teams[winnerIdx].wins++;
  teams[loserIdx].losses++;

  return {
    idx1, idx2,
    name1: t1.name, name2: t2.name,
    preVal1, preVal2,
    winnerIdx, loserIdx,
    winnerName: teams[winnerIdx].name,
    loserName: teams[loserIdx].name,
    roll, threshold, ratio,
    worstWins, stolen, stealBlocked,
  };
}

// ═══════════════════════════════════════════════════════════════
// RANKING MOVEMENT — loser down first, then winner up
// ═══════════════════════════════════════════════════════════════
function applyRankingMove(winnerIdx, loserIdx) {
  const moves = [];

  // Step 1: Loser moves down 1
  const loserPos = rankings.indexOf(loserIdx);
  if (loserPos < rankings.length - 1) {
    const displaced = rankings[loserPos + 1];
    rankings[loserPos] = displaced;
    rankings[loserPos + 1] = loserIdx;
    moves.push({ team: teams[loserIdx].name, from: loserPos + 1, to: loserPos + 2, dir:'down' });
    moves.push({ team: teams[displaced].name, from: loserPos + 2, to: loserPos + 1, dir:'up' });
  } else {
    moves.push({ team: teams[loserIdx].name, from: loserPos + 1, to: loserPos + 1, dir:'stay' });
  }

  // Step 2: Winner moves up 1 (re-find since array shifted)
  const winnerPos = rankings.indexOf(winnerIdx);
  if (winnerPos > 0) {
    const displaced = rankings[winnerPos - 1];
    rankings[winnerPos] = displaced;
    rankings[winnerPos - 1] = winnerIdx;
    moves.push({ team: teams[winnerIdx].name, from: winnerPos + 1, to: winnerPos, dir:'up' });
    moves.push({ team: teams[displaced].name, from: winnerPos, to: winnerPos + 1, dir:'down' });
  } else {
    moves.push({ team: teams[winnerIdx].name, from: 1, to: 1, dir:'stay' });
  }

  return moves;
}

// ═══════════════════════════════════════════════════════════════
// ROUND 1 MATCHUPS (hardcoded per spec)
// ═══════════════════════════════════════════════════════════════
function generateRound1Matchups() {
  const idx = name => teams.findIndex(t => t.name === name);
  // Bottom to top by best-ranked team in the pair
  return [
    { homeIdx: idx('Sevilla'),   awayIdx: idx('Málaga'),    beltId:'andalucia' },
    { homeIdx: idx('Zaragoza'),  awayIdx: idx('Murcia'),    beltId: null },
    { homeIdx: idx('Madrid II'), awayIdx: idx('València'),  beltId: null },
    { homeIdx: idx('Madrid'),    awayIdx: idx('Barcelona'), beltId:'spain' },
  ];
}

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════
function startRound() {
  roundNum++;
  roundMatchups = generateRound1Matchups(); // only round 1 for now
  roundResults = [];
  matchCursor = 0;
  roundActive = true;
  renderAll();
}

function playNextMatch() {
  if (!roundActive || matchCursor >= roundMatchups.length) return;

  const mu = roundMatchups[matchCursor];
  const result = simulateMatch(mu.homeIdx, mu.awayIdx);
  result.beltId = mu.beltId;

  // Belt transfer
  if (mu.beltId) {
    const belt = belts.find(b => b.id === mu.beltId);
    belt.holder = result.winnerIdx;
    result.beltWon = true;
    result.beltName = belt.name;
  }

  // Ranking movement
  const preRankings = [...rankings];
  result.rankMoves = applyRankingMove(result.winnerIdx, result.loserIdx);
  result.preRankings = preRankings;
  result.postRankings = [...rankings];

  roundResults.push(result);
  matchCursor++;

  if (matchCursor >= roundMatchups.length) {
    roundActive = false;
    allHistory.push({ round: roundNum, matches: [...roundResults] });
  }

  renderAll();
}

function playFullRound() {
  if (!roundActive) startRound();
  while (matchCursor < roundMatchups.length) playNextMatch();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function initSeason() {
  teams = INITIAL_TEAMS.map(t => ({ ...t, startValue: t.value, wins:0, losses:0 }));
  rankings = teams.map((_,i) => i).sort((a,b) => teams[b].value - teams[a].value);
  belts = INITIAL_BELTS.map(b => ({ ...b }));
  roundNum = 0; roundMatchups = []; roundResults = []; matchCursor = 0;
  allHistory = []; roundActive = false;
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelector(`nav button[onclick="showTab('${id}')"]`).classList.add('active');
}

function renderAll() { renderSim(); renderRankings(); renderBelts(); renderTeams(); renderHistory(); }

// ═══════════════════════════════════════════════════════════════
// RENDER: MATCHDAY
// ═══════════════════════════════════════════════════════════════
function renderSim() {
  const el = document.getElementById('tab-sim');
  let html = '';

  html += `<div class="controls">`;
  if (!roundActive && roundNum === 0) {
    html += `<button class="btn" onclick="startRound()">Start Round 1</button>`;
  } else if (roundActive) {
    html += `<button class="btn" onclick="playNextMatch()">Play Next Match</button>`;
    html += `<button class="btn btn-outline btn-sm" onclick="playFullRound()">Sim Full Round</button>`;
  } else {
    html += `<button class="btn" disabled>Round ${roundNum} Complete</button>`;
  }
  html += `<button class="btn btn-reset btn-sm" onclick="initSeason()" style="margin-left:auto">Reset</button>`;
  html += `</div>`;

  // Pre-round preview
  if (roundNum === 0) {
    html += `<div class="round-header"><h2>Preview — Round 1</h2><span class="round-badge">4 matches</span></div>`;
    const preview = generateRound1Matchups();
    preview.forEach(mu => {
      const t1 = teams[mu.homeIdx], t2 = teams[mu.awayIdx];
      const belt = mu.beltId ? belts.find(b => b.id === mu.beltId) : null;
      html += matchCardUpcoming(mu.homeIdx, mu.awayIdx, belt, false);
    });
    el.innerHTML = html;
    return;
  }

  // Active / completed round
  html += `<div class="round-header">
    <h2>Round ${roundNum}</h2>
    <span class="round-badge">${roundResults.length} / ${roundMatchups.length} played</span>
  </div>`;

  roundMatchups.forEach((mu, i) => {
    const res = roundResults[i];
    const isCurrent = roundActive && i === matchCursor;
    const belt = mu.beltId ? belts.find(b => b.id === mu.beltId) : null;

    if (res) {
      html += matchCardPlayed(res, mu, belt);
    } else {
      html += matchCardUpcoming(mu.homeIdx, mu.awayIdx, belt, isCurrent);
    }
  });

  el.innerHTML = html;
}

function matchCardUpcoming(idx1, idx2, belt, isCurrent) {
  const t1 = teams[idx1], t2 = teams[idx2];
  return `<div class="match-card${isCurrent ? ' current' : ''}">
    ${belt ? `<div style="padding:10px 20px 0"><span class="belt-badge belt-${belt.level}">🏆 ${belt.name} Belt</span></div>` : ''}
    <div class="match-row">
      <div class="match-team"><div>
        <div class="mname">${t1.name}</div>
        <div class="mrank">#${getRank(idx1)}</div>
        <div class="mval">${fmt(t1.value)}</div>
      </div></div>
      <div class="match-vs">${isCurrent ? '<span style="color:var(--gold)">NEXT</span>' : 'vs'}</div>
      <div class="match-team right"><div>
        <div class="mname">${t2.name}</div>
        <div class="mrank">#${getRank(idx2)}</div>
        <div class="mval">${fmt(t2.value)}</div>
      </div></div>
    </div>
  </div>`;
}

function matchCardPlayed(res, mu, belt) {
  const t1won = res.winnerIdx === mu.homeIdx;
  const t1 = teams[mu.homeIdx], t2 = teams[mu.awayIdx];
  return `<div class="match-card played fade-in">
    ${belt ? `<div style="padding:10px 20px 0"><span class="belt-badge belt-${belt.level}">🏆 ${belt.name} Belt</span></div>` : ''}
    <div class="match-row">
      <div class="match-team"><div>
        <div class="mname">${res.name1} ${t1won ? '<span class="winner-tag">WIN</span>' : '<span class="loser-tag">LOSS</span>'}</div>
        <div class="mrank">#${res.preRankings.indexOf(mu.homeIdx)+1} → #${res.postRankings.indexOf(mu.homeIdx)+1}</div>
        <div class="mval">${fmt(res.preVal1)} → ${fmt(t1.value)}</div>
      </div></div>
      <div class="match-vs">vs</div>
      <div class="match-team right"><div>
        <div class="mname">${!t1won ? '<span class="winner-tag">WIN</span> ' : '<span class="loser-tag">LOSS</span> '}${res.name2}</div>
        <div class="mrank">#${res.preRankings.indexOf(mu.awayIdx)+1} → #${res.postRankings.indexOf(mu.awayIdx)+1}</div>
        <div class="mval">${fmt(res.preVal2)} → ${fmt(t2.value)}</div>
      </div></div>
    </div>
    <div class="match-details">
      <span class="tag">Ratio: <b>${(res.ratio*1).toFixed(4)}</b></span>
      <span class="tag">Threshold: <b>${res.threshold}/200</b></span>
      <span class="tag">Roll: <b>${res.roll}</b></span>
      <span class="tag">${res.worstWins ? '🎲 Upset!' : '📊 Favored'}</span>
      <span class="tag">${res.stealBlocked
        ? '<span style="color:var(--muted);font-style:italic">No steal (≤50%)</span>'
        : '<span style="color:var(--orange)">Stole '+fmt(res.stolen)+' from '+res.loserName+'</span>'
      }</span>
      ${res.beltWon ? '<span class="tag" style="color:var(--gold)">🏆 '+res.winnerName+' claims '+res.beltName+'</span>' : ''}
    </div>
    <div class="rank-move">
      ${res.rankMoves.map(m =>
        m.dir==='up' ? `<span class="mv-up">▲ ${m.team} #${m.from} → #${m.to}</span>`
        : m.dir==='down' ? `<span class="mv-down">▼ ${m.team} #${m.from} → #${m.to}</span>`
        : `<span class="mv-neutral">— ${m.team} stays #${m.from}</span>`
      ).join(' &nbsp;·&nbsp; ')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: RANKINGS
// ═══════════════════════════════════════════════════════════════
function renderRankings() {
  const el = document.getElementById('tab-rankings');
  const maxVal = Math.max(...teams.map(t => t.value));
  let html = `<table class="standings">
    <thead><tr><th>#</th><th>Team</th><th>Comunidad</th><th>Value</th><th>Δ</th><th>W</th><th>L</th><th>Belts</th><th></th></tr></thead><tbody>`;

  rankings.forEach((tIdx, rank) => {
    const t = teams[tIdx];
    const delta = t.value - t.startValue;
    const barW = ((t.value / maxVal) * 100).toFixed(1);
    const tb = belts.filter(b => b.holder === tIdx);
    html += `<tr>
      <td class="pos">${rank+1}</td>
      <td class="team-name">${t.name}</td>
      <td style="font-size:.78rem;color:var(--muted)">${t.comunidad}</td>
      <td class="val">${fmt(t.value)}</td>
      <td class="mono ${delta>=0?'delta-pos':'delta-neg'}" style="font-size:.75rem">${delta>=0?'+':''}${fmt(delta)}</td>
      <td class="mono w">${t.wins}</td>
      <td class="mono l">${t.losses}</td>
      <td>${tb.map(b=>`<span class="belt-badge belt-${b.level}" style="font-size:.6rem;padding:2px 6px">${b.name}</span>`).join(' ')||'<span style="color:var(--muted);font-size:.7rem">—</span>'}</td>
      <td style="width:100px"><div style="background:var(--surface2);height:5px;border-radius:3px;overflow:hidden"><div style="width:${barW}%;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:3px"></div></div></td>
    </tr>`;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: BELTS
// ═══════════════════════════════════════════════════════════════
function renderBelts() {
  const el = document.getElementById('tab-belts');
  const levelColor = {national:'var(--gold)',regional:'var(--blue)',provincial:'var(--purple)'};
  let html = `<div class="belts-grid">`;
  belts.forEach(b => {
    const holder = b.holder !== null ? teams[b.holder] : null;
    html += `<div class="belt-card">
      <div class="belt-type" style="color:${levelColor[b.level]}">${b.level}</div>
      <div class="belt-name">🏆 ${b.name}</div>
      <div class="belt-holder">${holder ? `Held by <b>${holder.name}</b> · #${getRank(b.holder)} · ${fmt(holder.value)}` : '<span style="color:var(--muted)">Unclaimed</span>'}</div>
    </div>`;
  });
  html += `</div>`;
  if (belts.every(b => b.holder === null)) {
    html += `<p style="color:var(--muted);font-size:.85rem">Belts will be claimed after Round 1.</p>`;
  }
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: TEAMS
// ═══════════════════════════════════════════════════════════════
function renderTeams() {
  const el = document.getElementById('tab-teams');
  const maxVal = Math.max(...teams.map(t => t.value));
  let html = `<div class="teams-grid">`;
  rankings.forEach((tIdx, rank) => {
    const t = teams[tIdx];
    const delta = t.value - t.startValue;
    const barW = ((t.value / maxVal) * 100).toFixed(1);
    const tb = belts.filter(b => b.holder === tIdx);
    html += `<div class="team-card fade-in">
      <span class="rank">#${rank+1}</span>
      <div class="name">${t.name}</div>
      <div class="region">${t.comunidad} · ${t.provincia}</div>
      ${tb.length?`<div class="belt-list">${tb.map(b=>`<span class="belt-badge belt-${b.level}">${b.name}</span>`).join('')}</div>`:''}
      <div style="margin-top:6px">
        <span class="value">${fmt(t.value)}</span>
        ${delta!==0?`<span class="value-delta ${delta>0?'delta-pos':'delta-neg'}">${delta>0?'+':''}${fmt(delta)}</span>`:''}
      </div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:4px">${t.wins}W ${t.losses}L</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: HISTORY
// ═══════════════════════════════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('tab-history');
  if (allHistory.length === 0) {
    el.innerHTML = `<p style="color:var(--muted);text-align:center;padding:40px">No rounds completed yet.</p>`;
    return;
  }
  let html = '';
  allHistory.forEach(h => {
    html += `<div class="history-round"><h3>Round ${h.round}</h3>`;
    h.matches.forEach(res => {
      html += `<div class="history-match">
        <span class="${res.winnerIdx===res.idx1?'hw':'hl'}">${res.name1}</span> vs
        <span class="${res.winnerIdx===res.idx2?'hw':'hl'}">${res.name2}</span>
        · roll ${res.roll} / thr ${res.threshold}
        ${res.worstWins?' 🎲':''}
        ${!res.stealBlocked?' · <span style="color:var(--orange)">±'+fmt(res.stolen)+'</span>':''}
        ${res.beltWon?' · <span style="color:var(--gold)">🏆 '+res.beltName+'</span>':''}
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
initSeason();
</script>
</body>
</html>
