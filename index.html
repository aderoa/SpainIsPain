<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain is Pain — Belt Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0c0b;--surface:#1a1714;--surface2:#242019;--border:#3a3228;--text:#f0e6d6;--muted:#8a7e6e;--gold:#d4a843;--gold-dim:#b8922e;--red:#c9413b;--red-bright:#e85550;--green:#4caf6a;--blue:#4a8cc9;--orange:#d98a3b;--purple:#9b6dcc;--cyan:#5bbfbf;--font:'Outfit',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);color:var(--text);font-family:var(--font)}
body{min-height:100vh}

header{background:linear-gradient(135deg,#1a0a08,#2a1510,#1a0a08);border-bottom:2px solid var(--gold-dim);padding:28px 32px 24px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(212,168,67,.03) 60px,rgba(212,168,67,.03) 61px)}
header h1{font-size:2.4rem;font-weight:900;letter-spacing:-1px;position:relative;background:linear-gradient(to right,var(--gold),#f0d078,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{font-size:.85rem;color:var(--muted);font-weight:400;margin-top:4px;position:relative;letter-spacing:2px;text-transform:uppercase}
header .round-info{font-size:.75rem;color:var(--gold);font-weight:600;margin-top:6px;position:relative;font-family:var(--mono)}

nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto}
nav button{flex:0 0 auto;padding:14px 16px;background:none;border:none;color:var(--muted);font-family:var(--font);font-size:.78rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
nav button:hover{color:var(--text);background:rgba(212,168,67,.05)}
nav button.active{color:var(--gold);border-bottom-color:var(--gold)}

.tab{display:none;padding:24px;max-width:1020px;margin:0 auto}
.tab.active{display:block}

.btn{padding:12px 28px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0e0c0b;font-family:var(--font);font-size:.85rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,168,67,.25)}
.btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-sm{padding:8px 18px;font-size:.78rem}
.btn-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold)}
.btn-outline:hover{background:rgba(212,168,67,.1)}
.btn-reset{background:transparent;border:1px solid var(--red);color:var(--red-bright)}
.btn-reset:hover{background:rgba(201,65,59,.1)}
.btn-blue{background:linear-gradient(135deg,#3a7ab8,var(--blue));color:#fff}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}

table.standings{width:100%;border-collapse:collapse;font-size:.83rem}
table.standings th{text-align:left;padding:10px 12px;font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
table.standings td{padding:9px 12px;border-bottom:1px solid rgba(58,50,40,.4);vertical-align:middle}
table.standings tr:hover td{background:rgba(212,168,67,.03)}
.pos{font-family:var(--mono);font-weight:700;color:var(--muted);width:30px}
.val{font-family:var(--mono);color:var(--gold);font-weight:600}
.w{color:var(--green)}.l{color:var(--red-bright)}.mono{font-family:var(--mono)}
.delta-pos{color:var(--green)}.delta-neg{color:var(--red-bright)}

.match-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.match-card.played{border-color:rgba(212,168,67,.2)}
.match-card.current{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,67,.1)}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 20px;gap:16px}
.match-team{display:flex;align-items:center;gap:10px}
.match-team.right{justify-content:flex-end;text-align:right}
.mname{font-weight:600;font-size:.93rem;line-height:1.4}.mval{font-family:var(--mono);font-size:.72rem;color:var(--muted)}.mrank{font-family:var(--mono);font-size:.65rem;color:var(--muted)}
.match-vs{font-family:var(--mono);font-size:.7rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;min-width:40px;text-align:center}
.match-details{background:var(--surface2);padding:12px 20px;font-size:.76rem;color:var(--muted);display:flex;gap:18px;flex-wrap:wrap;border-top:1px solid var(--border)}
.match-details .tag{display:inline-flex;align-items:center;gap:4px}
.match-details .tag b{color:var(--text);font-weight:600}
.winner-tag{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(76,175,106,.15);color:var(--green)}
.loser-tag{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(232,85,80,.1);color:var(--red-bright)}

/* Belt badges — inline small */
.bb{display:inline-flex;align-items:center;gap:2px;font-size:.52rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-left:2px;vertical-align:middle}
.bb-national{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.bb-d2{background:rgba(91,191,191,.12);color:var(--cyan);border:1px solid rgba(91,191,191,.25)}
.bb-regional{background:rgba(74,140,201,.12);color:var(--blue);border:1px solid rgba(74,140,201,.25)}
.bb-provincial{background:rgba(155,109,204,.12);color:var(--purple);border:1px solid rgba(155,109,204,.25)}
/* Belt badges — larger */
.belt-badge{display:inline-flex;align-items:center;gap:4px;font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.belt-badge.belt-national{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.belt-badge.belt-d2{background:rgba(91,191,191,.12);color:var(--cyan);border:1px solid rgba(91,191,191,.25)}
.belt-badge.belt-regional{background:rgba(74,140,201,.12);color:var(--blue);border:1px solid rgba(74,140,201,.25)}
.belt-badge.belt-provincial{background:rgba(155,109,204,.12);color:var(--purple);border:1px solid rgba(155,109,204,.25)}

.match-belt-tag{padding:10px 20px 0}
.rank-move{background:var(--surface2);padding:10px 20px;font-size:.73rem;color:var(--muted);border-top:1px solid var(--border);font-family:var(--mono);line-height:1.8}
.mv-up{color:var(--green)}.mv-down{color:var(--red-bright)}.mv-neutral{color:var(--muted)}

.round-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.round-header h2{font-size:1.3rem;font-weight:800}
.round-badge{font-family:var(--mono);font-size:.73rem;background:var(--surface2);color:var(--gold);padding:6px 14px;border-radius:20px;border:1px solid var(--border)}
.priority-badge{font-size:.68rem;padding:5px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-weight:500}

.belts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}
.belt-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.belt-card .bt{font-size:.63rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.belt-card .bn{font-size:1rem;font-weight:700;margin-bottom:2px}
.belt-card .bh{font-size:.82rem;color:var(--muted)}.belt-card .bh b{color:var(--text)}
.belt-card .bstat{font-size:.7rem;color:var(--muted);margin-top:4px;font-family:var(--mono)}

.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;transition:transform .15s,border-color .2s}
.team-card:hover{transform:translateY(-2px);border-color:var(--gold-dim)}
.team-card .rank{position:absolute;top:10px;right:12px;font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.team-card .name{font-size:1.1rem;font-weight:700;margin-bottom:1px}
.team-card .region{font-size:.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.team-card .value{font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--gold)}
.team-card .vd{font-family:var(--mono);font-size:.68rem;margin-left:5px}
.team-card .bar-bg{height:5px;background:var(--surface2);border-radius:3px;margin-top:8px;overflow:hidden}
.team-card .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width .6s ease}
.team-card .belt-list{margin-top:6px;display:flex;gap:3px;flex-wrap:wrap}
.div-badge{font-size:.58rem;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.div-d1{background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.2)}
.div-d2n{background:rgba(91,191,191,.1);color:var(--cyan);border:1px solid rgba(91,191,191,.2)}
.div-d2s{background:rgba(217,138,59,.1);color:var(--orange);border:1px solid rgba(217,138,59,.2)}

.section-title{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.banner{padding:14px 20px;border-radius:8px;margin-bottom:16px;font-size:.85rem;font-weight:500}
.banner-gold{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);color:var(--gold)}
.banner-blue{background:rgba(74,140,201,.1);border:1px solid rgba(74,140,201,.25);color:var(--blue)}
.banner-green{background:rgba(76,175,106,.1);border:1px solid rgba(76,175,106,.25);color:var(--green)}

.group-columns{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.group-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;min-height:120px}
.group-col h3{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.group-col.north h3{color:var(--cyan)}.group-col.south h3{color:var(--orange)}
.group-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:6px;margin-bottom:6px;font-size:.82rem;cursor:pointer;transition:all .15s;border:1px solid transparent}
.group-item:hover{border-color:var(--gold-dim)}
.gi-name{font-weight:600}.gi-val{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
.gi-move{font-size:.65rem;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.unassigned-pool{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.unassigned-pool h3{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Belt log */
.blog-entry{display:grid;grid-template-columns:40px 1fr;gap:12px;padding:10px 0;border-bottom:1px solid rgba(58,50,40,.3);font-size:.82rem}
.blog-round{font-family:var(--mono);font-size:.7rem;color:var(--muted);padding-top:2px}
.blog-detail{line-height:1.5}
.blog-new{color:var(--gold);font-weight:600}
.blog-defended{color:var(--green)}
.blog-changed{color:var(--red-bright);font-weight:600}

.history-round{margin-bottom:20px}
.history-round h3{font-size:.88rem;font-weight:700;margin-bottom:6px;color:var(--gold)}
.history-match{font-size:.8rem;padding:6px 0;border-bottom:1px solid rgba(58,50,40,.3);line-height:1.6}
.hw{font-weight:700;color:var(--green)}.hl{color:var(--muted)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease both}
</style>
</head>
<body>

<header>
  <h1>Spain is Pain</h1>
  <div class="sub">Belt Championship · Divisions · Expansions</div>
  <div class="round-info" id="header-info"></div>
</header>

<nav>
  <button class="active" onclick="showTab('sim')">Matchday</button>
  <button onclick="showTab('rankings')">Rankings</button>
  <button onclick="showTab('belts')">Belts</button>
  <button onclick="showTab('teams')">Teams</button>
  <button onclick="showTab('groups')">D2 Groups</button>
  <button onclick="showTab('beltlog')">Belt Log</button>
  <button onclick="showTab('history')">History</button>
</nav>

<div id="tab-sim" class="tab active"></div>
<div id="tab-rankings" class="tab"></div>
<div id="tab-belts" class="tab"></div>
<div id="tab-teams" class="tab"></div>
<div id="tab-groups" class="tab"></div>
<div id="tab-beltlog" class="tab"></div>
<div id="tab-history" class="tab"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CSV_URLS=[
  'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJa_oKMLmu1yBLvWDnnuXnb3UduuQIdOrewmqW74XZM3r1VJZR3gO9uHd2GeRaS6vwCxkch0rPdFz/pub?gid=738693130&single=true&output=csv',
  'https://docs.google.com/spreadsheets/d/1zLlTolBIuZmWhVwEr-R23GbbeyiPYXhiluIhS4mRBE8/gviz/tq?tqx=out:csv&gid=738693130',
  'https://docs.google.com/spreadsheets/d/1zLlTolBIuZmWhVwEr-R23GbbeyiPYXhiluIhS4mRBE8/export?format=csv&gid=738693130',
];
const COOLDOWN=2;
const D1_SIZE=8;
const SEED_COUNT=8; // always start with first 8 from CSV or hardcoded

// Rotating belt priority per round (4-round cycle)
// Each entry is the order: [first_priority, second, third]
// 'national'=national+d2, 'regional', 'provincial'
const PRIORITY_CYCLE=[
  ['national','regional','provincial'],   // Round 1,5,9...
  ['regional','national','provincial'],   // Round 2,6,10...
  ['national','regional','provincial'],   // Round 3,7,11...
  ['provincial','national','regional'],   // Round 4,8,12...
];

function getRoundPriority(rnd){
  return PRIORITY_CYCLE[(rnd-1)%4];
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let teams=[];
let d1Rankings=[],d2nRankings=[],d2sRankings=[];
let belts=[];
let roundNum=0;
let matchHistory=[];  // [{round,a,b}]
let curMatchups=[];
let curResults=[];
let matchCursor=0;
let allHistory=[];    // [{round, matches:[...]}]
let beltLog=[];       // [{round, beltName, beltLevel, defender, challenger, winner, changed, newClaim}]
let roundActive=false;
let promoActive=false;
let phase='idle';
let expansionMsg='';

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function fmt(n){return n.toLocaleString('es-ES')}
function globalRank(tIdx){
  const s=[...teams.keys()].filter(i=>teams[i].division!=='unassigned').sort((a,b)=>teams[b].value-teams[a].value);
  return s.indexOf(tIdx)+1;
}
function divOf(tIdx){return teams[tIdx].division}
function divRankings(div){return div==='d2n'?d2nRankings:div==='d2s'?d2sRankings:d1Rankings}
function divRankOf(tIdx){
  const r=divRankings(divOf(tIdx));
  const p=r.indexOf(tIdx);return p===-1?999:p+1;
}
function teamBeltsHTML(tIdx){
  return belts.filter(b=>b.holder===tIdx).map(b=>`<span class="bb bb-${beltCSSLevel(b)}">🏆${b.name}</span>`).join('');
}
function beltCSSLevel(b){return b.level==='d2'?'d2':b.level}
function divLabel(d){return d==='d1'?'D1':d==='d2n'?'D2N':d==='d2s'?'D2S':'?'}

// ═══════════════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════════════
function parseCSVRow(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c=''}else c+=ch}
  r.push(c.trim());return r;
}
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.replace(/\r/g,'').trim()).filter(l=>l);
  if(lines.length<2)return[];
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=parseCSVRow(lines[i]);
    if(c.length>=4){
      const val=parseInt(c[3].replace(/[.,\s"]/g,''),10);
      if(!isNaN(val))rows.push({comunidad:c[0].replace(/"/g,''),provincia:c[1].replace(/"/g,''),name:c[2].replace(/"/g,''),value:val});
    }
  }
  return rows;
}
async function fetchCSV(){
  for(const url of CSV_URLS){
    try{
      const r=await fetch(url);
      if(!r.ok)continue;
      const t=await r.text();
      const data=parseCSV(t);
      if(data.length>0)return data;
    }catch(e){console.warn('CSV fail:',url,e)}
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// BELTS
// ═══════════════════════════════════════════════════════════════
function beltSortKey(b,priority){
  // priority = ['national','regional','provincial'] etc.
  // Within each tier, use the priority order
  const tierBase=(b.tier||1)-1;
  let levelIdx=priority.indexOf(b.level==='d2'?'national':b.level);
  if(levelIdx===-1)levelIdx=99;
  return tierBase*10+levelIdx;
}

function autoCreateBelts(){
  const coms={},provs={};
  teams.forEach((t,i)=>{
    if(!coms[t.comunidad])coms[t.comunidad]=[];
    coms[t.comunidad].push(i);
    if(!provs[t.provincia])provs[t.provincia]=[];
    provs[t.provincia].push(i);
  });
  for(const[com,idxs]of Object.entries(coms)){
    if(idxs.length>=2){
      const id='regional_'+com.toLowerCase().replace(/[^a-z0-9]/g,'_');
      if(!belts.find(b=>b.id===id))belts.push({id,level:'regional',tier:1,name:com,holder:null,scope:com,scopeType:'comunidad',defenses:0,changes:0});
    }
  }
  for(const[prov,idxs]of Object.entries(provs)){
    if(idxs.length>=2){
      const id='provincial_'+prov.toLowerCase().replace(/[^a-z0-9]/g,'_');
      if(!belts.find(b=>b.id===id))belts.push({id,level:'provincial',tier:1,name:prov+' (Prov.)',holder:null,scope:prov,scopeType:'provincia',defenses:0,changes:0});
    }
  }
}

function isEligibleForBelt(tIdx,belt){
  const t=teams[tIdx];
  if(belt.level==='national')return t.division==='d1';
  if(belt.level==='d2'){
    if(belt.scope==='north')return t.division==='d2n';
    if(belt.scope==='south')return t.division==='d2s';
  }
  if(belt.scopeType==='comunidad')return t.comunidad===belt.scope;
  if(belt.scopeType==='provincia')return t.provincia===belt.scope;
  return false;
}

// ═══════════════════════════════════════════════════════════════
// COOLDOWN
// ═══════════════════════════════════════════════════════════════
function onCooldown(a,b){
  const minR=roundNum-COOLDOWN;
  return matchHistory.some(h=>h.round>minR&&((h.a===a&&h.b===b)||(h.a===b&&h.b===a)));
}

// ═══════════════════════════════════════════════════════════════
// MATCHUP GENERATION
// ═══════════════════════════════════════════════════════════════
function generateMatchups(forRound){
  const rnd=forRound||roundNum+1;
  const priority=getRoundPriority(rnd);
  const allByValue=[...teams.keys()].filter(i=>teams[i].division!=='unassigned').sort((a,b)=>teams[b].value-teams[a].value);
  const paired=new Set();
  const matchups=[];

  // Sort belts by this round's priority
  const sortedBelts=[...belts].sort((a,b)=>beltSortKey(a,priority)-beltSortKey(b,priority));

  // 1) Held belts — defense
  for(const belt of sortedBelts){
    if(belt.holder===null||paired.has(belt.holder))continue;
    let challenger=null;
    for(const tIdx of allByValue){
      if(tIdx===belt.holder||paired.has(tIdx))continue;
      if(!isEligibleForBelt(tIdx,belt))continue;
      if(onCooldown(belt.holder,tIdx))continue;
      challenger=tIdx;break;
    }
    if(challenger!==null){
      matchups.push({homeIdx:belt.holder,awayIdx:challenger,beltId:belt.id});
      paired.add(belt.holder);paired.add(challenger);
    }
  }

  // 2) Unclaimed belts — best 2 eligible
  for(const belt of sortedBelts){
    if(belt.holder!==null)continue;
    const eligible=allByValue.filter(i=>isEligibleForBelt(i,belt)&&!paired.has(i));
    if(eligible.length>=2&&!onCooldown(eligible[0],eligible[1])){
      matchups.push({homeIdx:eligible[0],awayIdx:eligible[1],beltId:belt.id});
      paired.add(eligible[0]);paired.add(eligible[1]);
    }
  }

  // 3) Remaining by global rank — cross-division OK
  const unpaired=allByValue.filter(i=>!paired.has(i));
  const used=new Set();
  for(let i=0;i<unpaired.length;i++){
    if(used.has(unpaired[i]))continue;
    for(let j=i+1;j<unpaired.length;j++){
      if(used.has(unpaired[j]))continue;
      if(!onCooldown(unpaired[i],unpaired[j])){
        matchups.push({homeIdx:unpaired[i],awayIdx:unpaired[j],beltId:null});
        used.add(unpaired[i]);used.add(unpaired[j]);break;
      }
    }
  }

  // Sort bottom-to-top: best team's global rank descending (worse = first)
  matchups.sort((a,b)=>{
    const aBest=Math.min(globalRank(a.homeIdx),globalRank(a.awayIdx));
    const bBest=Math.min(globalRank(b.homeIdx),globalRank(b.awayIdx));
    return bBest-aBest;
  });

  return matchups;
}

// ═══════════════════════════════════════════════════════════════
// MATCH ENGINE
// ═══════════════════════════════════════════════════════════════
function simulateMatch(idx1,idx2){
  const t1=teams[idx1],t2=teams[idx2];
  const best=Math.max(t1.value,t2.value),worst=Math.min(t1.value,t2.value);
  const ratio=worst/best;
  const threshold=Math.floor(ratio*100);
  const roll=Math.floor(Math.random()*200)+1;
  const worstWins=roll<=threshold;
  const bestIdx=t1.value>=t2.value?idx1:idx2;
  const worstIdx=t1.value>=t2.value?idx2:idx1;
  const winnerIdx=worstWins?worstIdx:bestIdx;
  const loserIdx=winnerIdx===idx1?idx2:idx1;
  const preVal1=t1.value,preVal2=t2.value;
  let stolen=0,stealBlocked=false;
  const lr=teams[loserIdx].value/teams[winnerIdx].value;
  if(lr>0.5){stolen=Math.round(teams[loserIdx].value*0.1);teams[winnerIdx].value+=stolen;teams[loserIdx].value-=stolen}
  else{stealBlocked=true}
  teams[winnerIdx].wins++;teams[loserIdx].losses++;
  return{idx1,idx2,name1:t1.name,name2:t2.name,preVal1,preVal2,winnerIdx,loserIdx,winnerName:teams[winnerIdx].name,loserName:teams[loserIdx].name,roll,threshold,ratio,worstWins,stolen,stealBlocked};
}

// ═══════════════════════════════════════════════════════════════
// RANKING MOVEMENT
// ═══════════════════════════════════════════════════════════════
function applyRankMove(winnerIdx,loserIdx){
  const moves=[];
  const lDiv=divOf(loserIdx),lR=divRankings(lDiv),lp=lR.indexOf(loserIdx);
  if(lp>=0&&lp<lR.length-1){
    const d=lR[lp+1];lR[lp]=d;lR[lp+1]=loserIdx;
    moves.push({team:teams[loserIdx].name,from:lp+1,to:lp+2,dir:'down',div:lDiv});
    moves.push({team:teams[d].name,from:lp+2,to:lp+1,dir:'up',div:lDiv});
  }else if(lp>=0){moves.push({team:teams[loserIdx].name,from:lp+1,to:lp+1,dir:'stay',div:lDiv})}
  const wDiv=divOf(winnerIdx),wR=divRankings(wDiv),wp=wR.indexOf(winnerIdx);
  if(wp>0){
    const d=wR[wp-1];wR[wp]=d;wR[wp-1]=winnerIdx;
    moves.push({team:teams[winnerIdx].name,from:wp+1,to:wp,dir:'up',div:wDiv});
    moves.push({team:teams[d].name,from:wp,to:wp+1,dir:'down',div:wDiv});
  }else if(wp===0){moves.push({team:teams[winnerIdx].name,from:1,to:1,dir:'stay',div:wDiv})}
  return moves;
}

async function checkExpansion(){
  expansionMsg='Fetching...';renderAll();
  const csvData=await fetchCSV();
  if(!csvData){expansionMsg='⚠️ Could not fetch Google Sheet. Check it\'s published.';phase='idle';renderAll();return}
  const newRows=csvData.filter(row=>!teams.find(t=>t.name===row.name));
  if(newRows.length===0){expansionMsg='No new teams found.';phase='idle';renderAll();return}
  newRows.forEach(row=>{
    teams.push({name:row.name,comunidad:row.comunidad,provincia:row.provincia,value:row.value,startValue:row.value,wins:0,losses:0,division:'unassigned'});
  });
  autoCreateBelts();
  expansionMsg=`📦 ${newRows.length} new: ${newRows.map(r=>r.name).join(', ')}. Assign groups.`;
  phase='assign_groups';renderAll();
}

function assignTeam(tIdx,group){
  const prev=teams[tIdx].division;
  if(prev==='d2n')d2nRankings=d2nRankings.filter(i=>i!==tIdx);
  if(prev==='d2s')d2sRankings=d2sRankings.filter(i=>i!==tIdx);
  teams[tIdx].division=group;
  if(group==='d2n'&&!d2nRankings.includes(tIdx)){d2nRankings.push(tIdx);d2nRankings.sort((a,b)=>teams[b].value-teams[a].value)}
  if(group==='d2s'&&!d2sRankings.includes(tIdx)){d2sRankings.push(tIdx);d2sRankings.sort((a,b)=>teams[b].value-teams[a].value)}
  if(d2nRankings.length>=2&&!belts.find(b=>b.id==='d2_north'))belts.push({id:'d2_north',level:'d2',tier:2,name:'D2 North',holder:null,scope:'north',scopeType:'d2',defenses:0,changes:0});
  if(d2sRankings.length>=2&&!belts.find(b=>b.id==='d2_south'))belts.push({id:'d2_south',level:'d2',tier:2,name:'D2 South',holder:null,scope:'south',scopeType:'d2',defenses:0,changes:0});
  autoCreateBelts();renderAll();
}
function cycleTeamGroup(tIdx){
  const d=teams[tIdx].division;
  if(d==='unassigned')assignTeam(tIdx,'d2n');
  else if(d==='d2n'){d2nRankings=d2nRankings.filter(i=>i!==tIdx);assignTeam(tIdx,'d2s')}
  else if(d==='d2s'){d2sRankings=d2sRankings.filter(i=>i!==tIdx);teams[tIdx].division='unassigned';renderAll()}
}
function finishGroups(){
  if(teams.some(t=>t.division==='unassigned'))return;
  phase='idle';expansionMsg='';promoRelegMsg='';renderAll();
}
function finishPromoGroups(){
  if(teams.some(t=>t.division==='unassigned'))return;
  // After assigning relegated teams, go to post_round so user can check expansion
  phase='post_round';promoRelegMsg='';renderAll();
}

// ═══════════════════════════════════════════════════════════════
// PROMO/RELEG
// ═══════════════════════════════════════════════════════════════
function doPromoReleg(){
  if(!promoActive)return[];
  if(d2nRankings.length===0&&d2sRankings.length===0)return[];
  const msgs=[];

  // 1) Promote D2N #1 and D2S #1 into D1
  const promoted=[];
  const promoN=d2nRankings.length>0?d2nRankings[0]:null;
  const promoS=d2sRankings.length>0?d2sRankings[0]:null;
  [promoN,promoS].forEach(tIdx=>{
    if(tIdx===null)return;
    const pd=teams[tIdx].division;
    if(pd==='d2n')d2nRankings=d2nRankings.filter(i=>i!==tIdx);
    if(pd==='d2s')d2sRankings=d2sRankings.filter(i=>i!==tIdx);
    teams[tIdx].division='d1';
    promoted.push(tIdx);
    msgs.push(`▲ ${teams[tIdx].name} promoted to D1`);
  });

  // 2) Relegate D1 bottom 2 → 'unassigned' (user assigns group)
  const relegated=[];
  while(d1Rankings.length>D1_SIZE||(d1Rankings.length>D1_SIZE-promoted.length+relegated.length)){
    // Relegate the two worst — but only the original bottom 2 before promotions
    break; // handled below
  }
  // Get current bottom 2 of D1 BEFORE adding promoted (they were already removed from d2)
  // Actually promoted aren't in d1Rankings yet, so bottom 2 is correct
  if(d1Rankings.length>=2){
    const rel1=d1Rankings[d1Rankings.length-1];
    const rel2=d1Rankings[d1Rankings.length-2];
    [rel2,rel1].forEach(tIdx=>{
      d1Rankings=d1Rankings.filter(i=>i!==tIdx);
      teams[tIdx].division='unassigned';
      relegated.push(tIdx);
      msgs.push(`▼ ${teams[tIdx].name} relegated from D1`);
    });
  }

  // 3) Insert promoted into D1, sorted by value (tie-break)
  promoted.sort((a,b)=>teams[b].value-teams[a].value);
  promoted.forEach(tIdx=>{
    // Insert at correct position by value
    let inserted=false;
    for(let i=0;i<d1Rankings.length;i++){
      if(teams[tIdx].value>teams[d1Rankings[i]].value){
        d1Rankings.splice(i,0,tIdx);inserted=true;break;
      }
    }
    if(!inserted)d1Rankings.push(tIdx);
  });

  promoRelegMsg=msgs.join(' · ');
  return{promoted,relegated,msgs};
}
let promoRelegMsg='';

// ═══════════════════════════════════════════════════════════════
// ROUND FLOW
// ═══════════════════════════════════════════════════════════════
function prepareRound(){
  roundNum++;
  curMatchups=generateMatchups(roundNum);
  curResults=[];matchCursor=0;roundActive=true;phase='in_round';renderAll();
}

function playNext(){
  if(!roundActive||matchCursor>=curMatchups.length)return;
  const mu=curMatchups[matchCursor];
  const res=simulateMatch(mu.homeIdx,mu.awayIdx);
  res.beltId=mu.beltId;

  // Belt transfer — only the specific belt at stake
  if(mu.beltId){
    const belt=belts.find(b=>b.id===mu.beltId);
    if(belt){
      const wasHolder=belt.holder;
      const isNewClaim=wasHolder===null;
      belt.holder=res.winnerIdx;
      const changed=!isNewClaim&&wasHolder!==res.winnerIdx;
      if(!isNewClaim&&!changed)belt.defenses=(belt.defenses||0)+1;
      if(changed)belt.changes=(belt.changes||0)+1;
      res.beltWon=true;res.beltName=belt.name;res.beltLevel=belt.level;res.beltChanged=changed;res.beltNewClaim=isNewClaim;

      beltLog.push({
        round:roundNum,
        beltName:belt.name,beltLevel:belt.level,beltId:belt.id,
        defender:isNewClaim?null:teams[wasHolder].name,
        challenger:isNewClaim?null:teams[wasHolder===res.winnerIdx?res.loserIdx:res.winnerIdx].name,
        team1:res.name1,team2:res.name2,
        winner:res.winnerName,
        changed,newClaim:isNewClaim,
      });
    }
  }

  res.preWRank=divRankOf(res.winnerIdx);res.preLRank=divRankOf(res.loserIdx);
  res.rankMoves=applyRankMove(res.winnerIdx,res.loserIdx);
  res.postWRank=divRankOf(res.winnerIdx);res.postLRank=divRankOf(res.loserIdx);
  res.wDiv=divOf(res.winnerIdx);res.lDiv=divOf(res.loserIdx);

  matchHistory.push({round:roundNum,a:mu.homeIdx,b:mu.awayIdx});
  curResults.push(res);matchCursor++;

  if(matchCursor>=curMatchups.length){
    roundActive=false;
    allHistory.push({round:roundNum,matches:[...curResults],priority:getRoundPriority(roundNum)});
    // Auto promo/releg after round completes
    if(promoActive&&(d2nRankings.length>0||d2sRankings.length>0)){
      const result=doPromoReleg();
      phase='post_round_promo'; // show promo results, then user assigns relegated teams + expansion
    }else{
      phase='post_round';
      promoRelegMsg='';
    }
  }
  renderAll();
}

    const mx=Math.max(...ranks.map(i=>teams[i].value));
    h+=`<div class="section-title">${label}</div>`;
    h+=`<table class="standings"><thead><tr><th>#</th><th>Team</th><th>Comunidad</th><th>Value</th><th>Δ</th><th>W</th><th>L</th><th>Belts</th><th></th></tr></thead><tbody>`;
    ranks.forEach((tIdx,r)=>{
      const t=teams[tIdx],d=t.value-t.startValue,bw=((t.value/mx)*100).toFixed(1);
      const tb=belts.filter(b=>b.holder===tIdx);
      h+=`<tr><td class="pos">${r+1}</td><td style="font-weight:600">${t.name}</td>
        <td style="font-size:.76rem;color:var(--muted)">${t.comunidad}</td>
        <td class="val">${fmt(t.value)}</td>
        <td class="mono ${d>=0?'delta-pos':'delta-neg'}" style="font-size:.73rem">${d>=0?'+':''}${fmt(d)}</td>
        <td class="mono w">${t.wins}</td><td class="mono l">${t.losses}</td>
        <td>${tb.map(b=>`<span class="belt-badge belt-${beltCSSLevel(b)}" style="font-size:.55rem;padding:2px 5px">${b.name}</span>`).join(' ')||'—'}</td>
        <td style="width:90px"><div style="background:var(--surface2);height:5px;border-radius:3px;overflow:hidden"><div style="width:${bw}%;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:3px"></div></div></td></tr>`;
    });
    h+=`</tbody></table>`;
  }
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: BELTS
// ═══════════════════════════════════════════════════════════════
function renderBelts(){
  const el=document.getElementById('tab-belts');
  const lc={national:'var(--gold)',d2:'var(--cyan)',regional:'var(--blue)',provincial:'var(--purple)'};
  const nextPri=getRoundPriority(roundNum>0?roundNum:1);
  const sorted=[...belts].sort((a,b)=>beltSortKey(a,nextPri)-beltSortKey(b,nextPri));
  let h=`<div class="belts-grid">`;
  sorted.forEach(b=>{
    const holder=b.holder!==null?teams[b.holder]:null;
    h+=`<div class="belt-card">
      <div class="bt" style="color:${lc[b.level]||'var(--muted)'}">${b.level}${b.tier>1?' · Tier '+b.tier:''}</div>
      <div class="bn">🏆 ${b.name}</div>
      <div class="bh">${holder?`Held by <b>${holder.name}</b> · ${fmt(holder.value)}`:'<span style="color:var(--muted)">Unclaimed</span>'}</div>
      <div class="bstat">${b.defenses||0} defenses · ${b.changes||0} changes</div>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: TEAMS
// ═══════════════════════════════════════════════════════════════
function renderTeams(){
  const el=document.getElementById('tab-teams');
  let h='';const mx=Math.max(...teams.map(t=>t.value));
  for(const[div,label,ranks]of[['d1','Division 1',d1Rankings],['d2n','D2 North',d2nRankings],['d2s','D2 South',d2sRankings]]){
    if(!ranks.length)continue;
    h+=`<div class="section-title">${label}</div><div class="teams-grid">`;
    ranks.forEach((tIdx,r)=>{
      const t=teams[tIdx],d=t.value-t.startValue,bw=((t.value/mx)*100).toFixed(1);
      const tb=belts.filter(b=>b.holder===tIdx);
      const dc=div==='d1'?'div-d1':div==='d2n'?'div-d2n':'div-d2s';
      h+=`<div class="team-card"><span class="rank">#${r+1}</span>
        <div class="name">${t.name}</div>
        <div class="region">${t.comunidad} · ${t.provincia} <span class="div-badge ${dc}">${divLabel(div)}</span></div>
        ${tb.length?`<div class="belt-list">${tb.map(b=>`<span class="belt-badge belt-${beltCSSLevel(b)}">${b.name}</span>`).join('')}</div>`:''}
        <div style="margin-top:6px"><span class="value">${fmt(t.value)}</span>${d?`<span class="vd ${d>0?'delta-pos':'delta-neg'}">${d>0?'+':''}${fmt(d)}</span>`:''}</div>
        <div style="font-size:.73rem;color:var(--muted);margin-top:3px">${t.wins}W ${t.losses}L</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${bw}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: D2 GROUPS
// ═══════════════════════════════════════════════════════════════
function renderGroups(){
  const el=document.getElementById('tab-groups');
  const un=teams.map((_,i)=>i).filter(i=>teams[i].division==='unassigned');
  let h='';

  // Show confirm button at top if in assignment phase
  if(phase==='post_round_promo'||phase==='assign_groups'){
    const canConfirm=un.length===0;
    const action=phase==='post_round_promo'?'finishPromoGroups()':'finishGroups()';
    h+=`<div class="controls"><button class="btn" onclick="${action}" ${canConfirm?'':'disabled'}>Confirm Groups${un.length?' ('+un.length+' left)':''}</button></div>`;
  }

  if(un.length)h+=`<div class="banner banner-blue">Click to cycle: Unassigned → North → South → Unassigned</div>`;
  if(un.length){
    h+=`<div class="unassigned-pool"><h3>Unassigned (${un.length})</h3>`;
    un.forEach(tIdx=>{const t=teams[tIdx];h+=`<div class="group-item" onclick="cycleTeamGroup(${tIdx})"><span class="gi-name">${t.name} <span style="color:var(--muted);font-size:.72rem">${t.comunidad}</span></span><span class="gi-val">${fmt(t.value)}</span><span class="gi-move">→ North</span></div>`});
    h+=`</div>`;
  }
  h+=`<div class="group-columns"><div class="group-col north"><h3>D2 North (${d2nRankings.length})</h3>`;
  d2nRankings.forEach(tIdx=>{const t=teams[tIdx];h+=`<div class="group-item" onclick="cycleTeamGroup(${tIdx})"><span class="gi-name">${t.name}</span><span class="gi-val">${fmt(t.value)}</span><span class="gi-move">→ South</span></div>`});
  if(!d2nRankings.length)h+=`<p style="color:var(--muted);font-size:.8rem">Empty</p>`;
  h+=`</div><div class="group-col south"><h3>D2 South (${d2sRankings.length})</h3>`;
  d2sRankings.forEach(tIdx=>{const t=teams[tIdx];h+=`<div class="group-item" onclick="cycleTeamGroup(${tIdx})"><span class="gi-name">${t.name}</span><span class="gi-val">${fmt(t.value)}</span><span class="gi-move">→ Remove</span></div>`});
  if(!d2sRankings.length)h+=`<p style="color:var(--muted);font-size:.8rem">Empty</p>`;
  h+=`</div></div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: BELT LOG
// ═══════════════════════════════════════════════════════════════
function renderBeltLog(){
  const el=document.getElementById('tab-beltlog');
  if(!beltLog.length){el.innerHTML=`<p style="color:var(--muted);text-align:center;padding:40px">No belt matches yet.</p>`;return}

  // Group by belt
  const byBelt={};
  beltLog.forEach(entry=>{
    if(!byBelt[entry.beltId])byBelt[entry.beltId]={name:entry.beltName,level:entry.beltLevel,entries:[]};
    byBelt[entry.beltId].entries.push(entry);
  });

  // Sort belt groups: national first, then regional, then provincial
  const levelOrder={national:0,d2:1,regional:2,provincial:3};
  const sortedBeltIds=Object.keys(byBelt).sort((a,b)=>(levelOrder[byBelt[a].level]||9)-(levelOrder[byBelt[b].level]||9));

  let h=`<div style="font-size:.82rem;color:var(--muted);margin-bottom:16px">${beltLog.length} belt matches total across ${sortedBeltIds.length} belts</div>`;

  sortedBeltIds.forEach(bId=>{
    const group=byBelt[bId];
    const bClass='belt-'+beltCSSLevel({level:group.level});
    const defenses=group.entries.filter(e=>!e.changed&&!e.newClaim).length;
    const changes=group.entries.filter(e=>e.changed).length;
    const claims=group.entries.filter(e=>e.newClaim).length;

    h+=`<div style="margin-bottom:24px">`;
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
      <span class="belt-badge ${bClass}">🏆 ${group.name}</span>
      <span style="font-family:var(--mono);font-size:.68rem;color:var(--muted)">${group.entries.length} matches · ${defenses} defenses · ${changes} changes${claims?' · '+claims+' claims':''}</span>
    </div>`;

    group.entries.forEach(entry=>{
      let icon,cls,desc;
      if(entry.newClaim){
        icon='🏆';cls='blog-new';
        desc=`<b>${entry.winner}</b> claims belt (${entry.team1} vs ${entry.team2})`;
      }else if(entry.changed){
        icon='🔄';cls='blog-changed';
        desc=`<b>${entry.winner}</b> takes from ${entry.defender} (${entry.team1} vs ${entry.team2})`;
      }else{
        icon='🛡️';cls='blog-defended';
        desc=`<b>${entry.defender}</b> defends vs ${entry.challenger} (${entry.team1} vs ${entry.team2})`;
      }
      h+=`<div class="blog-entry"><div class="blog-round">R${entry.round}</div><div class="blog-detail ${cls}">${icon} ${desc}</div></div>`;
    });
    h+=`</div>`;
  });

  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: HISTORY
// ═══════════════════════════════════════════════════════════════
function renderHistory(){
  const el=document.getElementById('tab-history');
  if(!allHistory.length){el.innerHTML=`<p style="color:var(--muted);text-align:center;padding:40px">No rounds yet.</p>`;return}
  let h='';
  [...allHistory].reverse().forEach(rnd=>{
    const priLabels={national:'🏆N',regional:'🔵R',provincial:'🟣P'};
    h+=`<div class="history-round"><h3>Round ${rnd.round} <span style="font-weight:400;font-size:.72rem;color:var(--muted)">Priority: ${rnd.priority.map(x=>priLabels[x]).join('→')}</span></h3>`;
    rnd.matches.forEach(res=>{
      h+=`<div class="history-match">
        <span class="${res.winnerIdx===res.idx1?'hw':'hl'}">${res.name1}</span> vs
        <span class="${res.winnerIdx===res.idx2?'hw':'hl'}">${res.name2}</span>
        · roll ${res.roll}/${res.threshold}${res.worstWins?' 🎲':''}
        ${!res.stealBlocked?' · <span style="color:var(--orange)">±'+fmt(res.stolen)+'</span>':''}
        ${res.beltWon?` · <span style="color:${res.beltChanged?'var(--red-bright)':'var(--gold)'}">🏆 ${res.beltName}${res.beltChanged?' CHANGED':''}</span>`:''}
      </div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
initSeason();
</script>
