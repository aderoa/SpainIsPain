<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Spain is Pain — Belt Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0c0b;--surface:#1a1714;--surface2:#242019;--border:#3a3228;--text:#f0e6d6;--muted:#8a7e6e;--gold:#d4a843;--gold-dim:#b8922e;--red:#c9413b;--red-bright:#e85550;--green:#4caf6a;--blue:#4a8cc9;--orange:#d98a3b;--purple:#9b6dcc;--cyan:#5bbfbf;--font:'Outfit',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);color:var(--text);font-family:var(--font)}
body{min-height:100vh}

header{background:linear-gradient(135deg,#1a0a08,#2a1510,#1a0a08);border-bottom:2px solid var(--gold-dim);padding:28px 32px 24px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(212,168,67,.03) 60px,rgba(212,168,67,.03) 61px)}
header h1{font-size:2.4rem;font-weight:900;letter-spacing:-1px;position:relative;background:linear-gradient(to right,var(--gold),#f0d078,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{font-size:.85rem;color:var(--muted);font-weight:400;margin-top:4px;position:relative;letter-spacing:2px;text-transform:uppercase}

nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto}
nav button{flex:0 0 auto;padding:14px 16px;background:none;border:none;color:var(--muted);font-family:var(--font);font-size:.78rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}

.tab{display:none;padding:24px;max-width:1020px;margin:0 auto}
.tab.active{display:block}

.btn{padding:12px 28px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0e0c0b;font-family:var(--font);font-size:.85rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,168,67,.25)}
.btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-sm{padding:8px 18px;font-size:.78rem}
.btn-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold)}
.btn-outline:hover{background:rgba(212,168,67,.1)}
.btn-reset{background:transparent;border:1px solid var(--red);color:var(--red-bright)}
.btn-reset:hover{background:rgba(201,65,59,.1)}
.btn-blue{background:linear-gradient(135deg,#3a7ab8,var(--blue));color:#fff}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}

table.standings{width:100%;border-collapse:collapse;font-size:.83rem}
table.standings th{text-align:left;padding:10px 12px;font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}

table.standings tr:hover td{background:rgba(212,168,67,.03)}
.pos{font-family:var(--mono);font-weight:700;color:var(--muted);width:30px}
.team-name-cell{font-weight:600}
.val{font-family:var(--mono);color:var(--gold);font-weight:600}
.w{color:var(--green)}.l{color:var(--red-bright)}.mono{font-family:var(--mono)}
.delta-pos{color:var(--green)}.delta-neg{color:var(--red-bright)}

.match-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.match-card.played{border-color:rgba(212,168,67,.2)}
.match-card.current{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,67,.1)}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 20px;gap:16px}
.match-team{display:flex;align-items:center;gap:10px}
.match-team.right{justify-content:flex-end;text-align:right}
.mname{font-weight:600;font-size:.95rem}.mval{font-family:var(--mono);font-size:.72rem;color:var(--muted)}.mrank{font-family:var(--mono);font-size:.65rem;color:var(--muted)}
.match-vs{font-family:var(--mono);font-size:.7rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;min-width:40px;text-align:center}
.match-details{background:var(--surface2);padding:12px 20px;font-size:.76rem;color:var(--muted);display:flex;gap:18px;flex-wrap:wrap;border-top:1px solid var(--border)}
.match-details .tag{display:inline-flex;align-items:center;gap:4px}

.winner-tag{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(76,175,106,.15);color:var(--green)}
.loser-tag{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(232,85,80,.1);color:var(--red-bright)}

.bb{display:inline-flex;align-items:center;gap:3px;font-size:.55rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-left:3px;vertical-align:middle}
.bb-national{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.bb-d2{background:rgba(91,191,191,.12);color:var(--cyan);border:1px solid rgba(91,191,191,.25)}

.belt-badge.belt-national{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}

.round-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}

.belts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}

.team-card .region{font-size:.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.team-card .value{font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--gold)}

.div-d1{background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.2)}
.div-d2n{background:rgba(91,191,191,.1);color:var(--cyan);border:1px solid rgba(91,191,191,.2)}

.section-title{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.banner{padding:14px 20px;border-radius:8px;margin-bottom:16px;font-size:.85rem;font-weight:500}
.banner-gold{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);color:var(--gold)}
.banner-blue{background:rgba(74,140,201,.1);border:1px solid rgba(74,140,201,.25);color:var(--blue)}
.banner-green{background:rgba(76,175,106,.1);border:1px solid rgba(76,175,106,.25);color:var(--green)}
.banner-red{background:rgba(201,65,59,.1);border:1px solid rgba(201,65,59,.25);color:var(--red-bright)}

.group-columns{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.group-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;min-height:120px}
.group-col h3{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.group-col.north h3{color:var(--cyan)}.group-col.south h3{color:var(--orange)}
.group-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:6px;margin-bottom:6px;font-size:.82rem;cursor:pointer;transition:all .15s;border:1px solid transparent}
.group-item:hover{border-color:var(--gold-dim)}
.gi-name{font-weight:600}.gi-val{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
.gi-move{font-size:.65rem;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.unassigned-pool{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.unassigned-pool h3{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border)}

.history-round{margin-bottom:20px}
.history-round h3{font-size:.88rem;font-weight:700;margin-bottom:6px;color:var(--gold)}
.history-match{font-size:.8rem;padding:6px 0;border-bottom:1px solid rgba(58,50,40,.3);line-height:1.6}
.hw{font-weight:700;color:var(--green)}.hl{color:var(--muted)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease both}

<body>

<header>
  <h1>Spain is Pain</h1>
  <div class="sub">Belt Championship · Divisions · Expansions</div>
</header>

<nav id="main-nav">
  <button class="active" onclick="showTab('sim')">Matchday</button>
  <button onclick="showTab('rankings')">Rankings</button>
  <button onclick="showTab('belts')">Belts</button>
  <button onclick="showTab('teams')">Teams</button>
  <button onclick="showTab('groups')">D2 Groups</button>
  <button onclick="showTab('history')">History</button>
</nav>

<div id="tab-sim" class="tab active"></div>
<div id="tab-rankings" class="tab"></div>
<div id="tab-belts" class="tab"></div>
<div id="tab-teams" class="tab"></div>
<div id="tab-groups" class="tab"></div>
<div id="tab-history" class="tab"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CSV_URLS=[
  'https://docs.google.com/spreadsheets/d/1zLlTolBIuZmWhVwEr-R23GbbeyiPYXhiluIhS4mRBE8/gviz/tq?tqx=out:csv&gid=738693130',
  'https://docs.google.com/spreadsheets/d/1zLlTolBIuZmWhVwEr-R23GbbeyiPYXhiluIhS4mRBE8/export?format=csv&gid=738693130',
];
const COOLDOWN=2;

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let teams=[];
let d1Rankings=[],d2nRankings=[],d2sRankings=[];
let belts=[];
let roundNum=0;
let matchHistory=[];
let curMatchups=[];   // global matchup list for current round
let curResults=[];
let matchCursor=0;
let allHistory=[];
let roundActive=false;
let promoActive=false;
let phase='idle';
let expansionMsg='';

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function fmt(n){return n.toLocaleString('es-ES')}
function globalRank(tIdx){
  const sorted=[...teams.keys()].sort((a,b)=>teams[b].value-teams[a].value);
  return sorted.indexOf(tIdx)+1;
}
function divOf(tIdx){return teams[tIdx].division}
function divRankings(div){return div==='d2n'?d2nRankings:div==='d2s'?d2sRankings:d1Rankings}
function divRankOf(tIdx){
  const r=divRankings(divOf(tIdx));
  const p=r.indexOf(tIdx);return p===-1?999:p+1;
}
function teamBeltsHTML(tIdx){
  return belts.filter(b=>b.holder===tIdx).map(b=>`<span class="bb bb-${b.level}">🏆${b.name}</span>`).join('');
}

// ═══════════════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════════════
function parseCSVRow(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c=''}else c+=ch}
  r.push(c.trim());return r;
}
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.replace(/\r/g,'').trim()).filter(l=>l);
  if(lines.length<2)return[];
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=parseCSVRow(lines[i]);
    if(c.length>=4){
      const val=parseInt(c[3].replace(/[.,\s"]/g,''),10);
      if(!isNaN(val))rows.push({comunidad:c[0].replace(/"/g,''),provincia:c[1].replace(/"/g,''),name:c[2].replace(/"/g,''),value:val});
    }
  }
  return rows;
}
async function fetchCSV(){
  for(const url of CSV_URLS){
    try{
      const r=await fetch(url);
      if(!r.ok)continue;
      const t=await r.text();
      const data=parseCSV(t);
      if(data.length>0)return data;
    }catch(e){console.warn('CSV fetch failed:',url,e)}
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// BELTS
// ═══════════════════════════════════════════════════════════════
// Priority: lower = higher priority
// Tier 1: national(0), regional(1), provincial(2)
// Tier 2: d2-national(3), d2-regional(4), d2-provincial(5)
// etc.
function beltPriority(b){
  const tierBase=b.tier?((b.tier-1)*3):0;
  if(b.level==='national'||b.level==='d2')return tierBase+0;
  if(b.level==='regional')return tierBase+1;
  if(b.level==='provincial')return tierBase+2;
  return 99;
}

function beltCSS(b){return'belt-'+(b.level==='d2'?'d2':b.level)}

function autoCreateBelts(){
  // Regional
  const coms={};
  teams.forEach((t,i)=>{if(!coms[t.comunidad])coms[t.comunidad]=[];coms[t.comunidad].push(i)});
  for(const[com,idxs]of Object.entries(coms)){
    if(idxs.length>=2){
      const id='regional_'+com.toLowerCase().replace(/[^a-z0-9]/g,'_');
      if(!belts.find(b=>b.id===id)){
        belts.push({id,level:'regional',tier:1,name:com,holder:null,scope:com,scopeType:'comunidad'});
      }
    }
  }
  // Provincial
  const provs={};
  teams.forEach((t,i)=>{if(!provs[t.provincia])provs[t.provincia]=[];provs[t.provincia].push(i)});
  for(const[prov,idxs]of Object.entries(provs)){
    if(idxs.length>=2){
      const id='provincial_'+prov.toLowerCase().replace(/[^a-z0-9]/g,'_');
      if(!belts.find(b=>b.id===id)){
        belts.push({id,level:'provincial',tier:1,name:prov,holder:null,scope:prov,scopeType:'provincia'});
      }
    }
  }
}

function isEligibleForBelt(tIdx,belt){
  const t=teams[tIdx];
  if(belt.level==='national')return t.division==='d1';
  if(belt.level==='d2'){
    if(belt.scope==='north')return t.division==='d2n';
    if(belt.scope==='south')return t.division==='d2s';
  }
  if(belt.scopeType==='comunidad')return t.comunidad===belt.scope;
  if(belt.scopeType==='provincia')return t.provincia===belt.scope;
  return false;
}

// ═══════════════════════════════════════════════════════════════
// COOLDOWN
// ═══════════════════════════════════════════════════════════════
function onCooldown(a,b){
  const minR=roundNum-COOLDOWN;
  return matchHistory.some(h=>h.round>minR&&((h.a===a&&h.b===b)||(h.a===b&&h.b===a)));
}

// ═══════════════════════════════════════════════════════════════
// GLOBAL MATCHUP GENERATION
// ═══════════════════════════════════════════════════════════════
function generateMatchups(){
  // Global ranking by value (used for pairing + sort)
  const allByValue=[...teams.keys()].filter(i=>teams[i].division!=='unassigned').sort((a,b)=>teams[b].value-teams[a].value);
  const paired=new Set();
  const matchups=[];

  // Sort belts by priority
  const sortedBelts=[...belts].sort((a,b)=>beltPriority(a)-beltPriority(b));

  // 1) Held belts: defense matches
  for(const belt of sortedBelts){
    if(belt.holder===null||paired.has(belt.holder))continue;
    // Find best eligible challenger by value (global rank)
    let challenger=null;
    for(const tIdx of allByValue){
      if(tIdx===belt.holder||paired.has(tIdx))continue;
      if(!isEligibleForBelt(tIdx,belt))continue;
      if(onCooldown(belt.holder,tIdx))continue;
      challenger=tIdx;break;
    }
    if(challenger!==null){
      matchups.push({homeIdx:belt.holder,awayIdx:challenger,beltId:belt.id});
      paired.add(belt.holder);paired.add(challenger);
    }
  }

  // 2) Unclaimed belts: best 2 eligible
  for(const belt of sortedBelts){
    if(belt.holder!==null)continue;
    const eligible=allByValue.filter(i=>isEligibleForBelt(i,belt)&&!paired.has(i));
    if(eligible.length>=2&&!onCooldown(eligible[0],eligible[1])){
      matchups.push({homeIdx:eligible[0],awayIdx:eligible[1],beltId:belt.id});
      paired.add(eligible[0]);paired.add(eligible[1]);
    }
  }

  // 3) Remaining: best available vs next best (cross-division OK)
  const unpaired=allByValue.filter(i=>!paired.has(i));
  const used=new Set();
  for(let i=0;i<unpaired.length;i++){
    if(used.has(unpaired[i]))continue;
    for(let j=i+1;j<unpaired.length;j++){
      if(used.has(unpaired[j]))continue;
      if(!onCooldown(unpaired[i],unpaired[j])){
        matchups.push({homeIdx:unpaired[i],awayIdx:unpaired[j],beltId:null});
        used.add(unpaired[i]);used.add(unpaired[j]);
        break;
      }
    }
  }

  // Sort bottom-to-top: match whose BEST team has worst global rank goes first
  matchups.sort((a,b)=>{
    const aBest=Math.min(globalRank(a.homeIdx),globalRank(a.awayIdx));
    const bBest=Math.min(globalRank(b.homeIdx),globalRank(b.awayIdx));
    return bBest-aBest; // higher rank number (worse) first
  });

  return matchups;
}

// ═══════════════════════════════════════════════════════════════
// MATCH ENGINE
// ═══════════════════════════════════════════════════════════════
function simulateMatch(idx1,idx2){
  const t1=teams[idx1],t2=teams[idx2];
  const best=Math.max(t1.value,t2.value),worst=Math.min(t1.value,t2.value);
  const ratio=worst/best;
  const threshold=Math.floor(ratio*100);
  const roll=Math.floor(Math.random()*200)+1;
  const worstWins=roll<=threshold;
  const bestIdx=t1.value>=t2.value?idx1:idx2;
  const worstIdx=t1.value>=t2.value?idx2:idx1;
  const winnerIdx=worstWins?worstIdx:bestIdx;
  const loserIdx=winnerIdx===idx1?idx2:idx1;
  const preVal1=t1.value,preVal2=t2.value;
  let stolen=0,stealBlocked=false;
  const lr=teams[loserIdx].value/teams[winnerIdx].value;
  if(lr>0.5){stolen=Math.round(teams[loserIdx].value*0.1);teams[winnerIdx].value+=stolen;teams[loserIdx].value-=stolen}
  else{stealBlocked=true}
  teams[winnerIdx].wins++;teams[loserIdx].losses++;
  return{idx1,idx2,name1:t1.name,name2:t2.name,preVal1,preVal2,winnerIdx,loserIdx,winnerName:teams[winnerIdx].name,loserName:teams[loserIdx].name,roll,threshold,ratio,worstWins,stolen,stealBlocked};
}

// ═══════════════════════════════════════════════════════════════
// RANKING MOVEMENT (within own division)
// ═══════════════════════════════════════════════════════════════
function applyRankMove(winnerIdx,loserIdx){
  const moves=[];
  // Loser: move down in their division
  const lDiv=divOf(loserIdx);
  const lR=divRankings(lDiv);
  const lp=lR.indexOf(loserIdx);
  if(lp>=0&&lp<lR.length-1){
    const d=lR[lp+1];lR[lp]=d;lR[lp+1]=loserIdx;
    moves.push({team:teams[loserIdx].name,from:lp+1,to:lp+2,dir:'down',div:lDiv});
    moves.push({team:teams[d].name,from:lp+2,to:lp+1,dir:'up',div:lDiv});
  }else if(lp>=0){moves.push({team:teams[loserIdx].name,from:lp+1,to:lp+1,dir:'stay',div:lDiv})}

  // Winner: move up in their division
  const wDiv=divOf(winnerIdx);
  const wR=divRankings(wDiv);
  const wp=wR.indexOf(winnerIdx);
  if(wp>0){
    const d=wR[wp-1];wR[wp]=d;wR[wp-1]=winnerIdx;
    moves.push({team:teams[winnerIdx].name,from:wp+1,to:wp,dir:'up',div:wDiv});
    moves.push({team:teams[d].name,from:wp,to:wp+1,dir:'down',div:wDiv});
  }else if(wp===0){moves.push({team:teams[winnerIdx].name,from:1,to:1,dir:'stay',div:wDiv})}

  return moves;
}

// ═══════════════════════════════════════════════════════════════
// EXPANSION
// ═══════════════════════════════════════════════════════════════
async function checkExpansion(){
  expansionMsg='';
  const csvData=await fetchCSV();
  if(!csvData){expansionMsg='⚠️ Could not fetch Google Sheet. Check that the sheet is shared publicly.';phase='idle';renderAll();return}
  const newRows=csvData.filter(row=>!teams.find(t=>t.name===row.name));
  if(newRows.length===0){expansionMsg='No new teams found in the sheet.';phase='idle';renderAll();return}
  newRows.forEach(row=>{
    teams.push({name:row.name,comunidad:row.comunidad,provincia:row.provincia,value:row.value,startValue:row.value,wins:0,losses:0,division:'unassigned'});
  });
  autoCreateBelts();
  expansionMsg=`📦 ${newRows.length} new team(s) added: ${newRows.map(r=>r.name).join(', ')}. Assign to D2 groups.`;
  phase='assign_groups';
  renderAll();
}

function assignTeam(tIdx,group){
  const prev=teams[tIdx].division;
  if(prev==='d2n')d2nRankings=d2nRankings.filter(i=>i!==tIdx);
  if(prev==='d2s')d2sRankings=d2sRankings.filter(i=>i!==tIdx);
  teams[tIdx].division=group;
  if(group==='d2n'&&!d2nRankings.includes(tIdx)){d2nRankings.push(tIdx);d2nRankings.sort((a,b)=>teams[b].value-teams[a].value)}
  if(group==='d2s'&&!d2sRankings.includes(tIdx)){d2sRankings.push(tIdx);d2sRankings.sort((a,b)=>teams[b].value-teams[a].value)}
  // D2 belts
  if(d2nRankings.length>=2&&!belts.find(b=>b.id==='d2_north'))belts.push({id:'d2_north',level:'d2',tier:2,name:'D2 North',holder:null,scope:'north',scopeType:'d2'});
  if(d2sRankings.length>=2&&!belts.find(b=>b.id==='d2_south'))belts.push({id:'d2_south',level:'d2',tier:2,name:'D2 South',holder:null,scope:'south',scopeType:'d2'});
  autoCreateBelts();
  renderAll();
}

function cycleTeamGroup(tIdx){
  const div=teams[tIdx].division;
  if(div==='unassigned')assignTeam(tIdx,'d2n');
  else if(div==='d2n'){d2nRankings=d2nRankings.filter(i=>i!==tIdx);assignTeam(tIdx,'d2s')}
  else if(div==='d2s'){d2sRankings=d2sRankings.filter(i=>i!==tIdx);teams[tIdx].division='unassigned';renderAll()}
}

function finishGroups(){
  if(teams.some(t=>t.division==='unassigned')){return}
  phase='idle';expansionMsg='';renderAll();
}

// ═══════════════════════════════════════════════════════════════
// PROMO/RELEG
// ═══════════════════════════════════════════════════════════════
function doPromoReleg(){
  if(!promoActive)return;
  const msgs=[];
  if(d1Rankings.length>=2){
    const rel=[d1Rankings[d1Rankings.length-1],d1Rankings[d1Rankings.length-2]];
    rel.forEach(tIdx=>{
      d1Rankings=d1Rankings.filter(i=>i!==tIdx);
      teams[tIdx].division='unassigned';
      msgs.push(`▼ ${teams[tIdx].name} relegated from D1`);
    });
  }
  const promoN=d2nRankings.length>0?d2nRankings[0]:null;
  const promoS=d2sRankings.length>0?d2sRankings[0]:null;
  [promoN,promoS].forEach(tIdx=>{
    if(tIdx===null)return;
    if(teams[tIdx].division==='d2n')d2nRankings=d2nRankings.filter(i=>i!==tIdx);
    if(teams[tIdx].division==='d2s')d2sRankings=d2sRankings.filter(i=>i!==tIdx);
    teams[tIdx].division='d1';d1Rankings.push(tIdx);
    msgs.push(`▲ ${teams[tIdx].name} promoted to D1`);
  });
  expansionMsg=msgs.join(' · ');
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// ROUND FLOW
// ═══════════════════════════════════════════════════════════════
function prepareRound(){
  roundNum++;
  curMatchups=generateMatchups();
  curResults=[];
  matchCursor=0;
  roundActive=true;
  phase='in_round';
  renderAll();
}

function playNext(){
  if(!roundActive||matchCursor>=curMatchups.length)return;
  const mu=curMatchups[matchCursor];
  const res=simulateMatch(mu.homeIdx,mu.awayIdx);
  res.beltId=mu.beltId;
  if(mu.beltId){
    const belt=belts.find(b=>b.id===mu.beltId);
    if(belt){belt.holder=res.winnerIdx;res.beltWon=true;res.beltName=belt.name;res.beltLevel=belt.level}
  }
  // Snapshot div rankings before move
  const wDiv=divOf(res.winnerIdx),lDiv=divOf(res.loserIdx);
  res.preWRank=divRankOf(res.winnerIdx);res.preLRank=divRankOf(res.loserIdx);
  res.rankMoves=applyRankMove(res.winnerIdx,res.loserIdx);
  res.postWRank=divRankOf(res.winnerIdx);res.postLRank=divRankOf(res.loserIdx);
  res.wDiv=wDiv;res.lDiv=lDiv;

  matchHistory.push({round:roundNum,a:mu.homeIdx,b:mu.awayIdx});
  curResults.push(res);
  matchCursor++;

  if(matchCursor>=curMatchups.length){
    roundActive=false;phase='post_round';
    allHistory.push({round:roundNum,matches:[...curResults]});
  }
  renderAll();
}

function simAll(){
  while(roundActive)playNext();
}

function renderSim(){
  const el=document.getElementById('tab-sim');
  let h='';

  if(expansionMsg)h+=`<div class="banner banner-blue">${expansionMsg}</div>`;

  h+=`<div class="controls">`;
  if(phase==='idle'){
    h+=`<button class="btn" onclick="prepareRound()">Prepare Round ${roundNum+1}</button>`;
    if(roundNum>0)h+=`<button class="btn btn-blue btn-sm" onclick="checkExpansion()">Check Expansion</button>`;
    if(d2nRankings.length+d2sRankings.length>0){
      h+=`<button class="btn btn-outline btn-sm" onclick="promoActive=!promoActive;renderAll()">${promoActive?'🟢':'⚪'} Promo/Releg</button>`;
      if(promoActive)h+=`<button class="btn btn-outline btn-sm" onclick="doPromoReleg()">Apply Now</button>`;
    }
  }else if(phase==='in_round'){
    h+=`<button class="btn" onclick="playNext()">Play Next Match</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="simAll()">Sim All</button>`;
  }else if(phase==='post_round'){
    h+=`<button class="btn btn-blue" onclick="checkExpansion()">Check Expansion</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="phase='idle';expansionMsg='';renderAll()">Next Round</button>`;
  }else if(phase==='assign_groups'){
    const un=teams.filter(t=>t.division==='unassigned').length;
    h+=`<button class="btn" onclick="finishGroups()" ${un>0?'disabled':''}>Confirm Groups${un?' ('+un+' left)':''}</button>`;
  }
  h+=`<button class="btn btn-reset btn-sm" onclick="initSeason()" style="margin-left:auto">Reset</button>`;
  h+=`</div>`;

  if(phase==='assign_groups'){
    h+=`<div class="banner banner-gold">Go to <b>D2 Groups</b> tab to assign new teams, then confirm.</div>`;
  }

  // Show matchups
  const matchups=phase==='idle'&&roundNum===0?generateMatchups():curMatchups;
  const results=curResults;
  const isPreview=phase==='idle'&&roundNum===0;

  if(matchups.length>0){
    h+=`<div class="round-header">
      <h2>${isPreview?'Preview — ':''} Round ${isPreview?1:roundNum}</h2>
      <span class="round-badge">${results.length} / ${matchups.length}</span>
    </div>`;
  }

  matchups.forEach((mu,i)=>{
    const res=results[i];
    const isCur=roundActive&&i===matchCursor;
    h+=renderMatchCard(mu,res,isCur);
  });

  el.innerHTML=h;
}

function renderMatchCard(mu,res,isCur){
  const belt=mu.beltId?belts.find(b=>b.id===mu.beltId):null;
  const bClass=belt?'belt-'+belt.level:'';

  if(res){
    const t1w=res.winnerIdx===mu.homeIdx;
    const b1=teamBeltsHTML(mu.homeIdx),b2=teamBeltsHTML(mu.awayIdx);
    const div1=divOf(mu.homeIdx),div2=divOf(mu.awayIdx);
    const crossDiv=div1!==div2;

    return`<div class="match-card played fade-in">
      ${belt?`<div class="match-belt-tag"><span class="belt-badge ${bClass}">🏆 ${belt.name} Belt</span></div>`:''}
      <div class="match-row">
        <div class="match-team"><div>
          <div class="mname">${res.name1}${b1} ${t1w?'<span class="winner-tag">WIN</span>':'<span class="loser-tag">LOSS</span>'}</div>
          <div class="mrank">${divLabel(div1)} #${res.preWRank!==undefined&&mu.homeIdx===res.winnerIdx?res.preWRank:res.preLRank} → #${mu.homeIdx===res.winnerIdx?res.postWRank:res.postLRank}</div>
          <div class="mval">${fmt(res.preVal1)} → ${fmt(teams[mu.homeIdx].value)}</div>
        </div></div>
        <div class="match-vs">vs</div>
        <div class="match-team right"><div>
          <div class="mname">${!t1w?'<span class="winner-tag">WIN</span> ':'<span class="loser-tag">LOSS</span> '}${res.name2}${b2}</div>
          <div class="mrank">${divLabel(div2)} #${mu.awayIdx===res.winnerIdx?res.preWRank:res.preLRank} → #${mu.awayIdx===res.winnerIdx?res.postWRank:res.postLRank}</div>
          <div class="mval">${fmt(res.preVal2)} → ${fmt(teams[mu.awayIdx].value)}</div>
        </div></div>
      </div>
      <div class="match-details">
        <span class="tag">Ratio: <b>${res.ratio.toFixed(4)}</b></span>
        <span class="tag">Thr: <b>${res.threshold}/200</b></span>
        <span class="tag">Roll: <b>${res.roll}</b></span>
        <span class="tag">${res.worstWins?'🎲 Upset!':'📊 Favored'}</span>
        <span class="tag">${res.stealBlocked?'<i>No steal (≤50%)</i>':'<span style="color:var(--orange)">Stole '+fmt(res.stolen)+'</span>'}</span>
        ${res.beltWon?'<span class="tag" style="color:var(--gold)">🏆 '+res.winnerName+' claims '+res.beltName+'</span>':''}
        ${crossDiv?'<span class="tag" style="color:var(--cyan)">Cross-division</span>':''}
      </div>
      <div class="rank-move">${res.rankMoves.map(m=>m.dir==='up'?`<span class="mv-up">▲ ${m.team} ${divLabel(m.div)}#${m.from}→#${m.to}</span>`:m.dir==='down'?`<span class="mv-down">▼ ${m.team} ${divLabel(m.div)}#${m.from}→#${m.to}</span>`:`<span class="mv-neutral">— ${m.team} ${divLabel(m.div)}#${m.from}</span>`).join(' · ')}</div>
    </div>`;
  }

  const t1=teams[mu.homeIdx],t2=teams[mu.awayIdx];
  const b1=teamBeltsHTML(mu.homeIdx),b2=teamBeltsHTML(mu.awayIdx);
  return`<div class="match-card${isCur?' current':''}">
    ${belt?`<div class="match-belt-tag"><span class="belt-badge ${bClass}">🏆 ${belt.name} Belt</span></div>`:''}
    <div class="match-row">
      <div class="match-team"><div>
        <div class="mname">${t1.name}${b1}</div>
        <div class="mrank">${divLabel(divOf(mu.homeIdx))} #${divRankOf(mu.homeIdx)} · Global #${globalRank(mu.homeIdx)}</div>
        <div class="mval">${fmt(t1.value)}</div>
      </div></div>
      <div class="match-vs">${isCur?'<span style="color:var(--gold)">NEXT</span>':'vs'}</div>
      <div class="match-team right"><div>
        <div class="mname">${t2.name}${b2}</div>
        <div class="mrank">${divLabel(divOf(mu.awayIdx))} #${divRankOf(mu.awayIdx)} · Global #${globalRank(mu.awayIdx)}</div>
        <div class="mval">${fmt(t2.value)}</div>
      </div></div>
    </div>
  </div>`;
}

  });
  if(!d2nRankings.length)h+=`<p style="color:var(--muted);font-size:.8rem">Empty</p>`;
  h+=`</div><div class="group-col south"><h3>D2 South (${d2sRankings.length})</h3>`;
  d2sRankings.forEach(tIdx=>{
    const t=teams[tIdx];
    h+=`<div class="group-item" onclick="cycleTeamGroup(${tIdx})"><span class="gi-name">${t.name}</span><span class="gi-val">${fmt(t.value)}</span><span class="gi-move">→ Remove</span></div>`;
  });
  if(!d2sRankings.length)h+=`<p style="color:var(--muted);font-size:.8rem">Empty</p>`;
  h+=`</div></div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: HISTORY
// ═══════════════════════════════════════════════════════════════
function renderHistory(){
  const el=document.getElementById('tab-history');
  if(!allHistory.length){el.innerHTML=`<p style="color:var(--muted);text-align:center;padding:40px">No rounds yet.</p>`;return}
  let h='';
  [...allHistory].reverse().forEach(rnd=>{
    h+=`<div class="history-round"><h3>Round ${rnd.round}</h3>`;
    rnd.matches.forEach(res=>{
      h+=`<div class="history-match">
        <span class="${res.winnerIdx===res.idx1?'hw':'hl'}">${res.name1}</span> vs
        <span class="${res.winnerIdx===res.idx2?'hw':'hl'}">${res.name2}</span>
        · roll ${res.roll}/${res.threshold}${res.worstWins?' 🎲':''}
        ${!res.stealBlocked?' · <span style="color:var(--orange)">±'+fmt(res.stolen)+'</span>':''}
        ${res.beltWon?' · <span style="color:var(--gold)">🏆 '+res.beltName+'</span>':''}
      </div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
initSeason();
</script>
