<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain is Pain — Tournament Season</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0c0b;--surface:#1a1714;--surface2:#242019;--border:#3a3228;--text:#f0e6d6;--muted:#8a7e6e;--gold:#d4a843;--gold-dim:#b8922e;--red:#c9413b;--red-bright:#e85550;--green:#4caf6a;--blue:#4a8cc9;--orange:#d98a3b;--purple:#9b6dcc;--cyan:#5bbfbf;--font:'Outfit',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);color:var(--text);font-family:var(--font)}
body{min-height:100vh}

header{background:linear-gradient(135deg,#1a0a08,#2a1510,#1a0a08);border-bottom:2px solid var(--gold-dim);padding:22px 28px 18px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(212,168,67,.03) 60px,rgba(212,168,67,.03) 61px)}
header h1{font-size:2rem;font-weight:900;letter-spacing:-1px;position:relative;background:linear-gradient(to right,var(--gold),#f0d078,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{font-size:.78rem;color:var(--muted);margin-top:2px;position:relative;letter-spacing:2px;text-transform:uppercase}
header .info{font-size:.7rem;color:var(--gold);font-weight:600;margin-top:4px;position:relative;font-family:var(--mono)}

nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto}
nav button{flex:0 0 auto;padding:12px 14px;background:none;border:none;color:var(--muted);font-family:var(--font);font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
nav button:hover{color:var(--text);background:rgba(212,168,67,.05)}
nav button.active{color:var(--gold);border-bottom-color:var(--gold)}

.tab{display:none;padding:18px;max-width:1060px;margin:0 auto}
.tab.active{display:block}

.btn{padding:10px 22px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0e0c0b;font-family:var(--font);font-size:.8rem;font-weight:700;border:none;border-radius:7px;cursor:pointer;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,168,67,.25)}
.btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-sm{padding:7px 14px;font-size:.73rem}
.btn-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold)}
.btn-outline:hover{background:rgba(212,168,67,.1)}
.btn-reset{background:transparent;border:1px solid var(--red);color:var(--red-bright)}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}

.section-title{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

table.tbl{width:100%;border-collapse:collapse;font-size:.78rem}
table.tbl th{text-align:left;padding:7px 9px;font-size:.63rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
table.tbl td{padding:7px 9px;border-bottom:1px solid rgba(58,50,40,.3);vertical-align:middle}
table.tbl tr:hover td{background:rgba(212,168,67,.03)}
.pos{font-family:var(--mono);font-weight:700;color:var(--muted);width:26px}
.val{font-family:var(--mono);color:var(--gold);font-weight:600}
.mono{font-family:var(--mono)}
.delta-pos{color:var(--green)}.delta-neg{color:var(--red-bright)}

.tier-gs{background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.25)}
.tier-2{background:rgba(74,140,201,.1);color:var(--blue);border:1px solid rgba(74,140,201,.2)}
.tier-3{background:rgba(155,109,204,.1);color:var(--purple);border:1px solid rgba(155,109,204,.2)}
.tier-4{background:rgba(91,191,191,.08);color:var(--cyan);border:1px solid rgba(91,191,191,.18)}
.tier-lo{background:rgba(138,126,110,.08);color:var(--muted);border:1px solid rgba(138,126,110,.18)}
.tier-badge{display:inline-flex;font-size:.55rem;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:2px 6px;border-radius:3px}

/* Region badge */
.reg{display:inline-flex;font-size:.5rem;font-weight:700;padding:1px 4px;border-radius:2px;letter-spacing:.5px;vertical-align:middle;margin-right:2px}

.match-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:10px;overflow:hidden}
.match-card.current-m{border-color:var(--gold);box-shadow:0 0 16px rgba(212,168,67,.1)}
.match-card.played-m{border-color:rgba(212,168,67,.15)}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:12px 16px;gap:12px}
.match-team{display:flex;align-items:center;gap:8px}
.match-team.right{justify-content:flex-end;text-align:right}
.mname{font-weight:600;font-size:.88rem}.mval{font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.match-vs{font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;min-width:36px;text-align:center}
.match-details{background:var(--surface2);padding:10px 16px;font-size:.72rem;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid var(--border)}
.match-details .tag{display:inline-flex;align-items:center;gap:3px}
.match-details .tag b{color:var(--text);font-weight:600}
.winner-tag{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:rgba(76,175,106,.15);color:var(--green)}
.loser-tag{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:rgba(232,85,80,.1);color:var(--red-bright)}

.tourn-header-bar{background:linear-gradient(135deg,var(--surface2),var(--surface));border:2px solid var(--border);border-radius:9px;padding:14px 18px;margin:16px 0 6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;border-left:4px solid var(--gold)}
.tourn-header-bar .th-name{font-weight:800;font-size:1rem}
.tourn-header-bar .th-meta{font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.tourn-header-bar.th-gs{border-left-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,67,.08),var(--surface))}
.tourn-header-bar.th-l2{border-left-color:var(--blue);background:linear-gradient(135deg,rgba(74,140,201,.06),var(--surface))}
.tourn-header-bar.th-lo{border-left-color:var(--border)}

.day-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.day-nav h2{font-size:1.15rem;font-weight:800}
.day-badge{font-family:var(--mono);font-size:.7rem;background:var(--surface2);color:var(--gold);padding:5px 11px;border-radius:16px;border:1px solid var(--border)}

.banner{padding:11px 16px;border-radius:7px;margin-bottom:12px;font-size:.8rem;font-weight:500}
.banner-gold{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);color:var(--gold)}
.banner-green{background:rgba(76,175,106,.08);border:1px solid rgba(76,175,106,.2);color:var(--green)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease both}

/* Team Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;overflow-y:auto;padding:20px}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:640px;width:100%;margin:40px auto;padding:0;overflow:hidden}
.modal-head{background:linear-gradient(135deg,var(--surface2),var(--surface));padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:1.2rem;font-weight:800}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:4px 8px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.medal-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(58,50,40,.25);font-size:.82rem}
.medal-icon{font-size:1rem;width:24px;text-align:center}
.medal-tourn{font-weight:600}
.medal-host{color:var(--muted);font-size:.72rem}
.team-link{cursor:pointer;text-decoration:none;border-bottom:1px dotted rgba(212,168,67,.3)}
.team-link:hover{border-bottom-color:var(--gold)}
</style>
</head>
<body>

<header>
  <h1>Spain is Pain</h1>
  <div class="sub">Tournament Season</div>
  <div class="info" id="h-info">Loading...</div>
</header>

<nav>
  <button class="active" onclick="showTab('season')">Season</button>
  <button onclick="showTab('calendar')">Calendar</button>
  <button onclick="showTab('rankings')">Rankings</button>
  <button onclick="showTab('regional')">Regions</button>
  <button onclick="showTab('tournaments')">Tournaments</button>
  <button onclick="showTab('teams')">Teams</button>
  <button onclick="showTab('history')">History</button>
</nav>

<div id="tab-season" class="tab active"></div>
<div id="tab-calendar" class="tab"></div>
<div id="tab-rankings" class="tab"></div>
<div id="tab-regional" class="tab"></div>
<div id="tab-tournaments" class="tab"></div>
<div id="tab-teams" class="tab"></div>
<div id="tab-history" class="tab"></div>
<div id="team-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><div class="modal-head"><h2 id="modal-title"></h2><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body" id="modal-body"></div></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJa_oKMLmu1yBLvWDnnuXnb3UduuQIdOrewmqW74XZM3r1VJZR3gO9uHd2GeRaS6vwCxkch0rPdFz/pub?gid=738693130&single=true&output=csv';
const SAVE_KEY='sip_tourn_v4';
const COOL=7;
const DAYS=365;
const SEASON_END=349; // Dec 15 — regular tournaments end here
const CHAMP_SPAIN_DAY=351;  // Dec 17
const CHAMP_COM_DAY=358;    // Dec 24
const CHAMP_PROV_DAY=363;   // Dec 29

// Tier: [maxHostRank, teamCount, days, label, css, maxRankToPlay, minRankToPlay]
// maxRankToPlay: only teams ranked <= this can play (0=no limit)
// minRankToPlay: teams ranked < this cannot play (0=no limit, means top teams excluded from low tiers)
const TIERS=[
  [4,32,5,'Grand Slam','tier-gs',64,0],
  [12,32,5,'Level 2','tier-2',128,0],
  [28,16,4,'Level 3','tier-3',256,0],
  [60,16,4,'Level 4','tier-4',0,0],
  [124,16,4,'Level 5','tier-lo',0,13],
  [252,16,4,'Level 6','tier-lo',0,29],
  [508,16,4,'Level 7','tier-lo',0,61],
  [9999,16,4,'Level 8','tier-lo',0,125],
];
const PTS={'Grand Slam':[2000,1000,600,400,200,100],'Level 2':[1000,500,300,200,100,50],'Level 3':[400,200,120,80,40,0],'Level 4':[200,100,60,40,20,0],'Level 5':[100,50,30,20,10,0],'Level 6':[50,25,15,10,5,0],'Level 7':[25,12,8,5,2,0],'Level 8':[10,5,3,2,1,0]};
const CHAMP_PTS={spain:[500,250,150,100,50,25],com:[100,50,30,20,10,0],prov:[50,25,15,10,5,0]};

// Flags — Wikimedia Commons via Special:FilePath
const FP='https://commons.wikimedia.org/wiki/Special:FilePath/';
const COM_FLAGS={
  'Madrid':'Flag_of_the_Community_of_Madrid.svg',
  'Catalunya':'Flag_of_Catalonia.svg',
  'Andalucía':'Flag_of_Andaluc%C3%ADa.svg',
  'Com. Valenciana':'Flag_of_the_Valencian_Community_(2x3).svg',
  'Aragón':'Flag_of_Aragon.svg',
  'Castilla y León':'Flag_of_Castile_and_Le%C3%B3n.svg',
  'Galicia':'Flag_of_Galicia.svg',
  'Euskadi':'Flag_of_the_Basque_Country.svg',
  'Castilla-La Mancha':'Flag_of_Castile-La_Mancha.svg',
  'Canarias':'Flag_of_the_Canary_Islands.svg',
  'Murcia':'Flag_of_the_Region_of_Murcia.svg',
  'Illes Balears':'Flag_of_the_Balearic_Islands.svg',
  'Asturias':'Flag_of_Asturias.svg',
  'Navarra':'Flag_of_Navarre.svg',
  'Extremadura':'Flag_of_Extremadura_(with_coat_of_arms).svg',
  'Cantabria':'Flag_of_Cantabria.svg',
  'La Rioja':'Flag_of_La_Rioja_(with_coat_of_arms).svg',
};
const PROV_FLAGS={
  'Almería':'Flag_Almer%C3%ADa_Province.svg',
  'Cádiz':'Flag_C%C3%A1diz_Province.svg',
  'Málaga':'Flag_M%C3%A1laga_Province.svg',
  'Sevilla':'Flag_of_Diputacion_de_Sevilla_Spain.svg',
  'Huesca':'Flag_of_Huesca_(province).svg',
  'Teruel':'Flag_of_Teruel_(province).svg',
  'Barcelona':'Flag_of_Barcelona_(province).svg',
  'Ciudad Real':'Flag_Ciudad_Real_Province.svg',
  'Cuenca':'Flag_Cuenca_Province.svg',
  'Guadalajara':'Flag_Guadalajara_Province.svg',
  'Burgos':'Flag_Burgos_Province.svg',
  'Segovia':'Flag_Segovia_province.svg',
  'Soria':'Flag_Soria_province.svg',
  'Cáceres':'Flag_of_the_province_of_C%C3%A1ceres.svg',
  'Lugo':'Flag_of_Lugo_province.svg',
  'Pontevedra':'Flag_Pontevedra_Province.svg',
  'Araba':'Flag_of_%C3%81lava.svg',
  'Bizkaia':'Flag_of_Biscay.svg',
  'Gipuzkoa':'Flag_of_Gipuzkoa.svg',
  'Ceuta':'Flag_of_Ceuta.svg',
  'Melilla':'Flag_of_Melilla.svg',
};
function flagUrl(file,w){return FP+file+'?width='+w}
function flagImg(com,size){
  const s=size||14;
  const h=Math.round(s*0.67);
  const cf=COM_FLAGS[com];
  if(!cf)return'';
  return`<img src="${flagUrl(cf,s*2)}" width="${s}" height="${h}" style="vertical-align:middle;margin-right:3px;border-radius:1px;object-fit:cover" onerror="this.style.display='none'" loading="lazy">`;
}
function regBadge(com){return flagImg(com,14)}
function comFlag(com,size){return flagImg(com,size||14)}

// Date helpers
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_DAYS=[31,28,31,30,31,30,31,31,30,31,30,31];
function dayToDate(d){
  let m=0,rem=d;
  while(m<12&&rem>MONTH_DAYS[m]){rem-=MONTH_DAYS[m];m++}
  return`${MONTHS[m]} ${rem}`;
}
function dayToDateShort(d){
  let m=0,rem=d;
  while(m<12&&rem>MONTH_DAYS[m]){rem-=MONTH_DAYS[m];m++}
  return`${rem}/${m+1}`;
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let allTeams=[];
let tournaments=[];
let calendar=[];
let currentDay=0;
let pts={};
let stats={};
let seasonDone=false;
let dayQueue=[];
let queuePos=0;
let daySimmed=false;
let h2h={};         // {"min-max": [minWins, maxWins]} where min/max are sorted team indices
let palmares=[];    // [{year,tournId,label,css,hostName,hostCom,winnerName,winnerCom,runnerUpName,thirdName}]
let seasonYear=1;
let pendingExpansion=false; // true when waiting for expansion
let expansionMsg='';

// Expansion days: 15th and last day of each month
function getExpansionDays(){
  const days=[];let dayOff=0;
  MONTH_DAYS.forEach(md=>{days.push(dayOff+15);days.push(dayOff+md);dayOff+=md});
  return days;
}
const EXPANSION_DAYS=getExpansionDays();
const EXPANSION_SIZE=10;

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function fmt(n){return n.toLocaleString('es-ES')}
function randInt(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function getTier(r){for(const[mx,tc,d,l,c,maxR,minR]of TIERS)if(r<=mx)return{teamCount:tc,days:d,label:l,css:c,maxRank:maxR||0,minRank:minR||0};return{teamCount:16,days:4,label:'Level 8',css:'tier-lo',maxRank:0,minRank:125}}
function isTop12(t){return t.label==='Grand Slam'||t.label==='Level 2'}
function totalRounds(t){return t.teamCount===32?5:4}

// Can this team play in this tournament based on rank restrictions?
function canPlayInTier(tIdx,tourn){
  const ranked=getRanked();
  const rank=ranked.indexOf(tIdx)+1;
  const tier=getTier(tourn.hostIdx+1);
  if(tier.maxRank>0&&rank>tier.maxRank)return false; // too low ranked for top tournaments
  if(tier.minRank>0&&rank<tier.minRank)return false;  // too high ranked for bottom tournaments
  return true;
}

// ═══════════════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════════════
function parseCSVRow(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c=''}else c+=ch}r.push(c.trim());return r}
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.replace(/\r/g,'').trim()).filter(l=>l);
  if(lines.length<2)return[];
  const rows=[];
  for(let i=1;i<lines.length;i++){const c=parseCSVRow(lines[i]);if(c.length>=4){const v=parseInt(c[3].replace(/[.,\s"]/g,''),10);if(!isNaN(v))rows.push({provincia:c[0].replace(/"/g,''),comunidad:c[1].replace(/"/g,''),name:c[2].replace(/"/g,''),value:v})}}
  return rows.sort((a,b)=>b.value-a.value);
}

// ═══════════════════════════════════════════════════════════════
// CALENDAR — random placement like CycleSim
// ═══════════════════════════════════════════════════════════════
const TOP12_MIN_DAY=46; // No top-12 before Feb 15

function buildCalendar(){
  calendar=Array.from({length:DAYS+1},()=>[]);
  const dayLoad=new Array(DAYS+1).fill(0);

  // 1) Top 12: shuffle, place randomly after Feb 15, no overlap
  const top12=[...tournaments.filter(t=>isTop12(t))];
  for(let i=top12.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[top12[i],top12[j]]=[top12[j],top12[i]]}

  const top12Windows=[];
  top12.forEach(t=>{
    const valid=[];
    for(let d=TOP12_MIN_DAY;d<=SEASON_END-t.days+1;d++){
      let ok=true;
      for(const w of top12Windows){
        if(d<=w.end&&d+t.days-1>=w.start){ok=false;break}
      }
      if(ok)valid.push(d);
    }
    const startDay=valid[Math.floor(Math.random()*valid.length)]||TOP12_MIN_DAY;
    t.startDay=startDay;
    for(let d=0;d<t.days;d++){calendar[startDay+d].push(t.id);dayLoad[startDay+d]++}
    top12Windows.push({start:startDay,end:startDay+t.days-1});
  });

  const top12Days=new Set();
  top12Windows.forEach(w=>{for(let d=w.start;d<=w.end;d++)top12Days.add(d)});

  // 2) All other tournaments: truly random with load balancing
  const rest=[...tournaments.filter(t=>!isTop12(t))];
  for(let i=rest.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rest[i],rest[j]]=[rest[j],rest[i]]}

  const provWindows={};

  rest.forEach(t=>{
    const prov=allTeams[t.hostIdx].provincia;
    const dur=t.days;

    let bestDay=1,bestScore=Infinity;
    for(let d=1;d<=SEASON_END-dur+1;d++){
      // Large random base ensures truly random placement
      let score=Math.random()*200;
      // Load penalty — keeps days from getting too packed
      for(let dd=0;dd<dur;dd++){
        score+=dayLoad[d+dd]*15;
        if(top12Days.has(d+dd))score+=3000;
      }
      // Same-province penalty
      const pw=provWindows[prov]||[];
      for(const w of pw){
        if(d<=w.end+2&&d+dur-1>=w.start-2)score+=800;
        if(d<=w.end&&d+dur-1>=w.start)score+=3000;
      }
      if(score<bestScore){bestScore=score;bestDay=d}
    }

    t.startDay=bestDay;
    for(let d=0;d<dur;d++){calendar[bestDay+d].push(t.id);dayLoad[bestDay+d]++}
    if(!provWindows[prov])provWindows[prov]=[];
    provWindows[prov].push({start:bestDay,end:bestDay+dur-1});
  });
}

// ═══════════════════════════════════════════════════════════════
// TEAM SELECTION
// ═══════════════════════════════════════════════════════════════
function getRanked(){return allTeams.map((_,i)=>i).sort((a,b)=>(pts[b]||0)-(pts[a]||0)||allTeams[b].value-allTeams[a].value)}
function initStats(i){if(!stats[i])stats[i]={played:0,wins:0,losses:0,tp:0}}

// Check if team is in any active (incomplete) tournament
function isTeamBusy(tIdx){
  return tournaments.some(t=>!t.complete&&t.teams&&t.teams.includes(tIdx));
}

// Find the latest day a team is/was committed to (for cooling check)
// Checks both active AND recently completed tournaments
function teamBusyUntil(tIdx){
  let latest=0;
  tournaments.forEach(t=>{
    if(t.teams&&t.teams.includes(tIdx)){
      const endDay=t.startDay+t.days-1;
      if(endDay>latest)latest=endDay;
    }
  });
  return latest;
}

function selectTeams(t){
  const host=allTeams[t.hostIdx];
  const ranked=getRanked();
  const n=t.teamCount;
  // Available = not busy, not host-frozen, and meets rank restrictions
  const avail=i=>{initStats(i);return !isTeamBusy(i)&&!isHostFrozen(i,t.startDay)&&canPlayInTier(i,t)};
  const availTop12=i=>{initStats(i);if(isTeamBusy(i)||isHostFrozen(i,t.startDay))return false;if(!canPlayInTier(i,t))return false;const bu=teamBusyUntil(i);return bu===0||bu<=t.startDay-COOL};
  const fn=isTop12(t)?availTop12:avail;
  // Host always plays (skip rank restriction for host)
  const hostAvail=!isTeamBusy(t.hostIdx)&&!isHostFrozen(t.hostIdx,t.startDay);
  const sel=new Set(hostAvail?[t.hostIdx]:[]);

  if(t.label==='Grand Slam'){
    for(const i of ranked){if(sel.size>=n)break;if(!sel.has(i)&&fn(i))sel.add(i)}
  }else if(t.label==='Level 2'){
    let mc=0;
    for(const i of ranked){if(sel.size>=n||mc>=24)break;if(!sel.has(i)&&fn(i)){sel.add(i);mc++}}
    ranked.filter(i=>allTeams[i].comunidad===host.comunidad&&!sel.has(i)&&fn(i)).forEach(i=>{if(sel.size<n)sel.add(i)});
    for(const i of ranked){if(sel.size>=n)break;if(!sel.has(i)&&fn(i))sel.add(i)}
  }else{
    // Half local — RANDOMIZED (not always the biggest), same provincia > comunidad
    const localTarget=Math.floor(n/2);
    const local=ranked.filter(i=>!sel.has(i)&&avail(i)&&(allTeams[i].provincia===host.provincia||allTeams[i].comunidad===host.comunidad));
    // Weighted shuffle: fewest tournaments played get priority, but still random
    local.sort((a,b)=>{
      const sa=stats[a]?.tp||0,sb_=stats[b]?.tp||0;
      if(sa!==sb_)return sa-sb_;
      return Math.random()-0.5;
    });
    local.slice(0,localTarget-1).forEach(i=>sel.add(i));

    // Half random from OUTSIDE host comunidad — fewest tournaments first
    const outsiders=ranked.filter(i=>!sel.has(i)&&avail(i)&&allTeams[i].comunidad!==host.comunidad);
    outsiders.sort((a,b)=>{
      const sa=stats[a]?.tp||0,sb_=stats[b]?.tp||0;
      if(sa!==sb_)return sa-sb_;
      return Math.random()-0.5;
    });
    outsiders.slice(0,n-sel.size).forEach(i=>sel.add(i));
    if(sel.size<n){
      const fill=ranked.filter(i=>!sel.has(i)&&avail(i));
      fill.sort(()=>Math.random()-0.5);
      fill.slice(0,n-sel.size).forEach(i=>sel.add(i));
    }
  }

  const arr=[...sel].sort((a,b)=>(pts[b]||0)-(pts[a]||0)||allTeams[b].value-allTeams[a].value);
  arr.forEach(i=>{initStats(i);stats[i].tp++});
  // Store seed map: teamIdx → seed number (1-indexed, 0 = unseeded)
  const halfSeeds=Math.floor(n/2);
  t.seedMap={};
  arr.forEach((tIdx,i)=>{t.seedMap[tIdx]=i<halfSeeds?i+1:0});
  t.teams=arr;
  t.bracket=buildTennisBracket(arr);
}

// Host calendar freeze: hosts can't be picked for other tournaments 7 days before their own
function isHostFrozen(tIdx,day){
  const hosted=tournaments.find(t=>t.hostIdx===tIdx&&!t.complete);
  if(!hosted)return false;
  return day>=hosted.startDay-COOL&&day<hosted.startDay;
}

function buildTennisBracket(teams){
  const n=teams.length;
  if(n<2)return teams;
  const halfSeeds=Math.floor(n/2);
  const seeded=teams.slice(0,halfSeeds);
  const unseeded=[...teams.slice(halfSeeds)];
  for(let i=unseeded.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[unseeded[i],unseeded[j]]=[unseeded[j],unseeded[i]]}
  const seedSlots16=[0,14,8,6,4,10,12,2];
  const seedSlots32=[0,30,16,14,8,22,24,6,4,26,20,10,12,18,28,2];
  const slots=n===32?seedSlots32:seedSlots16;
  const bracket=new Array(n).fill(null);
  seeded.forEach((tIdx,si)=>{if(si<slots.length)bracket[slots[si]]=tIdx});
  let ui=0;
  for(let i=0;i<n;i++){if(bracket[i]===null&&ui<unseeded.length){bracket[i]=unseeded[ui++]}}
  return bracket;
}

// ═══════════════════════════════════════════════════════════════
// MATCH ENGINE — with home advantage
// ═══════════════════════════════════════════════════════════════
function simMatch(a,b,tournId){
  const t1=allTeams[a],t2=allTeams[b];
  const best=Math.max(t1.value,t2.value),worst=Math.min(t1.value,t2.value);
  const ratio=worst/best;
  let thr=Math.floor(ratio*100);

  // Home advantage: bonus to threshold if playing in home territory
  let homeBonus='';
  if(tournId!=null){
    const tourn=tournaments[tournId];
    const hostTeam=allTeams[tourn.hostIdx];
    // Check each team for home advantage
    [a,b].forEach(tIdx=>{
      const team=allTeams[tIdx];
      let bonus=0;
      if(team.name===hostTeam.name)bonus=10;        // host city
      else if(team.provincia===hostTeam.provincia)bonus=5;  // same province
      else if(team.comunidad===hostTeam.comunidad)bonus=3;  // same region
      if(bonus>0){
        // Bonus adds to threshold if this team is the weaker one, or subtracts if stronger
        if(tIdx===(t1.value<=t2.value?a:b)){
          thr=Math.min(100,thr+bonus); // weaker team gets boost
        }else{
          thr=Math.max(0,thr-bonus); // stronger team's opponent gets boost = their threshold drops... 
          // Actually: threshold is "chance for weaker to win", so if the STRONGER team has home advantage,
          // the weaker team's chance decreases
        }
        homeBonus+=(homeBonus?' ':'')+(team.name.substring(0,8))+' +'+bonus+'%';
      }
    });
  }

  const roll=Math.floor(Math.random()*200)+1;
  const ww=roll<=thr;
  const bi=t1.value>=t2.value?a:b,wi_=t1.value>=t2.value?b:a;
  const winI=ww?wi_:bi,losI=winI===a?b:a;
  let stolen=0,sb=false;
  const lr=allTeams[losI].value/allTeams[winI].value;
  if(lr>0.5){stolen=Math.round(allTeams[losI].value*0.1);allTeams[winI].value+=stolen;allTeams[losI].value-=stolen}else sb=true;
  initStats(winI);initStats(losI);
  stats[winI].played++;stats[winI].wins++;stats[losI].played++;stats[losI].losses++;
  // H2H tracking
  const hk=Math.min(a,b)+'-'+Math.max(a,b);
  if(!h2h[hk])h2h[hk]=[0,0];
  if(winI===Math.min(a,b))h2h[hk][0]++;else h2h[hk][1]++;
  return{a,b,winI,losI,roll,thr,ww,stolen,sb,n1:t1.name,n2:t2.name,wn:allTeams[winI].name,ln:allTeams[losI].name,homeBonus};
}

function getH2H(a,b){
  const hk=Math.min(a,b)+'-'+Math.max(a,b);
  const rec=h2h[hk];
  if(!rec)return null;
  const aWins=a===Math.min(a,b)?rec[0]:rec[1];
  const bWins=a===Math.min(a,b)?rec[1]:rec[0];
  return{aWins,bWins};
}

// ═══════════════════════════════════════════════════════════════
// TOURNAMENT ROUND LOGIC
// ═══════════════════════════════════════════════════════════════
function getAlive(t){
  let alive=[...t.bracket].filter(x=>x!=null);
  for(let r=0;r<10;r++){
    if(!t.results[r])break;
    alive=t.results[r].map(m=>m.winI);
  }
  return alive;
}

function buildDayQueue(){
  dayQueue=[];queuePos=0;
  const todayIds=(calendar[currentDay]||[]);
  // Sort by tier importance (hostIdx = rank, lower = more important) to match display order
  const sortedTids=[...todayIds].sort((a,b)=>tournaments[a].hostIdx-tournaments[b].hostIdx);

  sortedTids.forEach(tid=>{
    const t=tournaments[tid];
    if(t.complete)return;
    if(!t.teams||!t.teams.length)selectTeams(t);
    const rIdx=Object.keys(t.results).filter(k=>k!=='bronze').length;
    const tr=totalRounds(t);
    if(rIdx>=tr)return;
    const alive=getAlive(t);
    const roundName=rIdx===tr-1?'Final':rIdx===tr-2?'Semi':rIdx===tr-3?'QF':'R'+(rIdx+1);

    // On final day: bronze match first, then final
    if(rIdx===tr-1&&t.results[tr-2]){
      const sfLosers=t.results[tr-2].map(m=>m.losI);
      if(sfLosers.length===2&&!t.results.bronze){
        dayQueue.push({tid,rIdx:'bronze',roundName:'Bronze',t1:sfLosers[0],t2:sfLosers[1],result:null});
      }
    }

    // Regular matches for this round
    for(let i=0;i<alive.length;i+=2){
      if(i+1<alive.length){
        dayQueue.push({tid,rIdx,roundName,t1:alive[i],t2:alive[i+1],result:null});
      }
    }
  });
  daySimmed=dayQueue.length===0;
}



function playNextInQueue(){
  if(queuePos>=dayQueue.length)return;
  const q=dayQueue[queuePos];
  const tournId=q.isChamp?null:q.tid;
  const res=simMatch(q.t1,q.t2,tournId);
  q.result=res;

  // Get the target object (tournament or championship)
  const t=q.isChamp?championships[q.champIdx]:tournaments[q.tid];
  if(q.rIdx==='bronze'){
    t.results.bronze=[res];
    t.third=res.winI;t.fourth=res.losI;
    q.winMsg=`🥉 ${res.wn} wins Bronze!`;
  }else{
    if(!t.results[q.rIdx])t.results[q.rIdx]=[];
    t.results[q.rIdx].push(res);
    q.winMsg=`${res.wn} advances`;
  }
  queuePos++;
  const tr=q.isChamp?champTotalRounds(t):totalRounds(t);
  if(q.rIdx===tr-1){
    const roundMatches=dayQueue.filter(x=>x.tid===q.tid&&x.rIdx===q.rIdx);
    if(roundMatches.every(x=>x.result)){
      t.winner=roundMatches[0].result.winI;t.runnerUp=roundMatches[0].result.losI;t.complete=true;
      if(!q.isChamp){
        awardPoints(t);
        // teams freed automatically when t.complete=true
      }else{
        // Award championship points
        const cpKey=t.type;
        const cp=CHAMP_PTS[cpKey]||[50,25,15,10,5,0];
        if(t.winner!=null)pts[t.winner]=(pts[t.winner]||0)+cp[0];
        if(t.runnerUp!=null)pts[t.runnerUp]=(pts[t.runnerUp]||0)+cp[1];
        if(t.third!=null)pts[t.third]=(pts[t.third]||0)+cp[2];
        if(t.fourth!=null)pts[t.fourth]=(pts[t.fourth]||0)+cp[3];
      }
      const champLabel=q.isChamp?t.name:t.label;
      q.winMsg=`🏆 ${allTeams[t.winner].name} wins the ${champLabel}!`;
      // Record in palmares
      palmares.push({
        year:seasonYear,tournId:q.isChamp?'champ_'+q.champIdx:q.tid,label:q.isChamp?t.name:t.label,css:t.css,
        hostName:allTeams[t.hostIdx].name,hostCom:allTeams[t.hostIdx].comunidad,
        winnerName:allTeams[t.winner].name,winnerCom:allTeams[t.winner].comunidad,
        runnerUpName:allTeams[t.runnerUp].name,
        thirdName:t.third!=null?allTeams[t.third].name:null,
      });
    }
  }
  if(queuePos>=dayQueue.length)daySimmed=true;
  saveState();
  renderAll();
}

function simRestOfDay(){while(queuePos<dayQueue.length)playNextInQueue()}

// ═══════════════════════════════════════════════════════════════
// EXPANSION — twice a month (15th + last day)
// ═══════════════════════════════════════════════════════════════
async function checkExpansion(){
  expansionMsg='Fetching teams...';renderAll();
  try{
    const r=await fetch(CSV_URL);const text=await r.text();
    const data=parseCSV(text);
    if(!data){expansionMsg='⚠️ Could not fetch sheet.';renderAll();return}

    // Find teams not yet in allTeams
    const newRows=data.filter(row=>!allTeams.find(t=>t.name===row.name));
    if(newRows.length===0){
      expansionMsg='No new teams in the sheet. Add '+EXPANSION_SIZE+' teams and try again.';
      renderAll();return;
    }

    // Take up to EXPANSION_SIZE
    const batch=newRows.slice(0,EXPANSION_SIZE);
    // Min TP from ALL existing teams (including those with 0)
    let minTP=Infinity;
    for(let i=0;i<allTeams.length;i++){minTP=Math.min(minTP,stats[i]?.tp||0)}
    if(minTP===Infinity)minTP=0;

    batch.forEach(row=>{
      const idx=allTeams.length;
      allTeams.push({...row,startValue:row.value});
      initStats(idx);
      stats[idx].tp=minTP;

      // Create tournament
      const tier=getTier(idx+1);
      const tourn={id:tournaments.length,hostIdx:idx,label:tier.label,css:tier.css,
        teamCount:tier.teamCount,days:tier.days,startDay:0,
        teams:[],bracket:[],results:{},winner:null,runnerUp:null,third:null,fourth:null,complete:false,nextYear:false};
      tournaments.push(tourn);

      // Schedule on any day 1-SEASON_END (random, load-balanced)
      const dur=tourn.days;
      const prov=row.provincia;
      let bestDay=1,bestScore=Infinity;
      for(let d=1;d<=SEASON_END-dur+1;d++){
        let score=Math.random()*200;
        for(let dd=0;dd<dur;dd++){
          score+=(calendar[d+dd]?.length||0)*15;
        }
        for(let dd=0;dd<dur;dd++){
          const dayTourns=calendar[d+dd]||[];
          if(dayTourns.some(tid=>allTeams[tournaments[tid]?.hostIdx]?.provincia===prov))score+=800;
        }
        if(score<bestScore){bestScore=score;bestDay=d}
      }
      tourn.startDay=bestDay;
      // If scheduled before current day, mark for next year
      if(bestDay<=currentDay){
        tourn.nextYear=true;
        // Don't add to calendar this year — it'll be scheduled next season
      }else{
        for(let d=0;d<dur;d++){
          if(!calendar[bestDay+d])calendar[bestDay+d]=[];
          calendar[bestDay+d].push(tourn.id);
        }
      }
    });

    const thisYear=batch.filter((_,i)=>!tournaments[tournaments.length-batch.length+i].nextYear).length;
    const nextYr=batch.length-thisYear;
    const remaining=newRows.length-batch.length;
    expansionMsg=`📦 ${batch.length} new: ${batch.map(r=>r.name).join(', ')}. TP=${minTP}. ${thisYear} this year, ${nextYr} next year.${remaining>0?' ('+remaining+' more next expansion)':''}`;
    pendingExpansion=false;
    buildDayQueue(); // Build queue for this expansion day
    saveState();renderAll();
  }catch(e){
    expansionMsg='⚠️ Fetch failed: '+e.message;
    renderAll();
  }
}

function skipExpansion(){
  pendingExpansion=false;expansionMsg='';
  buildDayQueue();saveState();renderAll();
}

// CHAMPIONSHIPS — end of season special events
// ═══════════════════════════════════════════════════════════════
let championships=[]; // [{type:'spain'|'com'|'prov',name,teams,bracket,results,winner,...}]

function createChampionships(){
  championships=[];
  const ranked=getRanked();

  // Spain Championship: top 64, 6 rounds (Dec 17-22), rotating host
  const spainTeams=ranked.slice(0,64);
  const hostIdx=spainTeams[seasonYear%spainTeams.length]; // rotating host
  championships.push({
    type:'spain',name:'Spain Championship 🇪🇸',hostIdx,
    teams:spainTeams,teamCount:64,days:6,startDay:CHAMP_SPAIN_DAY,
    bracket:buildTennisBracket(spainTeams),results:{},
    winner:null,runnerUp:null,third:null,fourth:null,complete:false,
    seedMap:Object.fromEntries(spainTeams.map((t,i)=>i<32?[t,i+1]:[t,0])),
    css:'tier-gs',label:'🇪🇸 Spain Championship',
  });

  // Comunidad Championships: top 16 per comunidad (Dec 24-27)
  const coms={};
  allTeams.forEach((t,i)=>{if(!coms[t.comunidad])coms[t.comunidad]=[];coms[t.comunidad].push(i)});
  for(const[com,idxs]of Object.entries(coms)){
    // Sort by ranking
    const sorted=idxs.sort((a,b)=>(pts[b]||0)-(pts[a]||0)||allTeams[b].value-allTeams[a].value);
    const teams=sorted.slice(0,16);
    // Pad to nearest power of 2 for bracket
    let bracketSize=2;
    while(bracketSize<teams.length)bracketSize*=2;
    const hostI=teams[0];
    championships.push({
      type:'com',name:com+' Championship',hostIdx:hostI,
      teams,teamCount:bracketSize,days:4,startDay:CHAMP_COM_DAY,
      bracket:buildTennisBracket(teams),results:{},
      winner:null,runnerUp:null,third:null,fourth:null,complete:false,
      seedMap:Object.fromEntries(teams.map((t,i)=>i<Math.floor(teams.length/2)?[t,i+1]:[t,0])),
      css:'tier-2',label:comFlag(com)+com,actualTeams:teams.length,
    });
  }

  // Provincia Championships: top 8 per provincia with 2+ teams (Dec 29-31)
  const provs={};
  allTeams.forEach((t,i)=>{if(!provs[t.provincia])provs[t.provincia]={com:t.comunidad,teams:[]};provs[t.provincia].teams.push(i)});
  for(const[prov,{com,teams:idxs}]of Object.entries(provs)){
    if(idxs.length<2)continue;
    const sorted=idxs.sort((a,b)=>(pts[b]||0)-(pts[a]||0)||allTeams[b].value-allTeams[a].value);
    const teams=sorted.slice(0,8);
    let bracketSize=2;
    while(bracketSize<teams.length)bracketSize*=2;
    const hostI=teams[0];
    championships.push({
      type:'prov',name:prov+' Championship',hostIdx:hostI,
      teams,teamCount:bracketSize,days:3,startDay:CHAMP_PROV_DAY,
      bracket:buildTennisBracket(teams),results:{},
      winner:null,runnerUp:null,third:null,fourth:null,complete:false,
      seedMap:Object.fromEntries(teams.map((t,i)=>i<Math.floor(teams.length/2)?[t,i+1]:[t,0])),
      css:'tier-3',label:comFlag(com)+prov,actualTeams:teams.length,
    });
  }
}

function getChampAlive(c){
  let alive=[...c.bracket].filter(x=>x!=null);
  for(let r=0;r<20;r++){
    if(!c.results[r])break;
    alive=c.results[r].map(m=>m.winI);
  }
  return alive;
}

function champTotalRounds(c){
  let n=c.teamCount,r=0;while(n>1){n/=2;r++}return r;
}

function buildChampDayQueue(){
  dayQueue=[];queuePos=0;
  // Find active championships for today
  const activeChamps=championships.filter(c=>!c.complete&&currentDay>=c.startDay&&currentDay<c.startDay+c.days);
  // Sort: spain first, then com, then prov
  const typeOrder={spain:0,com:1,prov:2};
  activeChamps.sort((a,b)=>(typeOrder[a.type]||9)-(typeOrder[b.type]||9));

  activeChamps.forEach(c=>{
    const rIdx=Object.keys(c.results).filter(k=>k!=='bronze').length;
    const tr=champTotalRounds(c);
    if(rIdx>=tr)return;
    const alive=getChampAlive(c);
    const roundName=rIdx===tr-1?'Final':rIdx===tr-2?'Semi':rIdx===tr-3?'QF':'R'+(rIdx+1);

    // Bronze before final
    if(rIdx===tr-1&&c.results[tr-2]){
      const sfLosers=c.results[tr-2].map(m=>m.losI);
      if(sfLosers.length===2&&!c.results.bronze){
        dayQueue.push({tid:'champ_'+championships.indexOf(c),isChamp:true,champIdx:championships.indexOf(c),rIdx:'bronze',roundName:'Bronze',t1:sfLosers[0],t2:sfLosers[1],result:null});
      }
    }

    for(let i=0;i<alive.length;i+=2){
      if(i+1<alive.length){
        dayQueue.push({tid:'champ_'+championships.indexOf(c),isChamp:true,champIdx:championships.indexOf(c),rIdx,roundName,t1:alive[i],t2:alive[i+1],result:null});
      }
    }
  });
  daySimmed=dayQueue.length===0;
}

function advanceDay(){
  if(seasonDone||pendingExpansion)return;

  currentDay++;
  if(currentDay>DAYS){seasonDone=true;saveState();renderAll();return}

  // Create championships when we reach Dec 17
  if(currentDay===CHAMP_SPAIN_DAY&&championships.length===0){
    createChampionships();
  }

  // Check if this is an expansion day (only before championships)
  if(currentDay<CHAMP_SPAIN_DAY&&EXPANSION_DAYS.includes(currentDay)){
    pendingExpansion=true;
    expansionMsg=`📦 Expansion day! (${dayToDate(currentDay)}) — Check for ${EXPANSION_SIZE} new teams.`;
    saveState();renderAll();
    return;
  }

  // Championship days
  if(currentDay>=CHAMP_SPAIN_DAY){
    buildChampDayQueue();
  }else{
    buildDayQueue();
  }
  saveState();renderAll();
}

// POINTS
// ═══════════════════════════════════════════════════════════════
function awardPoints(t){
  const p=PTS[t.label]||[10,5,3,2,1,0];
  if(t.winner!=null)pts[t.winner]=(pts[t.winner]||0)+p[0];
  if(t.runnerUp!=null)pts[t.runnerUp]=(pts[t.runnerUp]||0)+p[1];
  if(t.third!=null)pts[t.third]=(pts[t.third]||0)+p[2];
  if(t.fourth!=null)pts[t.fourth]=(pts[t.fourth]||0)+p[3];
  const tr=totalRounds(t);
  const qf=t.results[tr-3];
  if(qf)qf.forEach(m=>{if(m.losI!==t.third&&m.losI!==t.fourth)pts[m.losI]=(pts[m.losI]||0)+p[4]});
  if(t.teamCount===32){const r16=t.results[0];if(r16)r16.forEach(m=>{pts[m.losI]=(pts[m.losI]||0)+p[5]})}
}

// INIT
// ═══════════════════════════════════════════════════════════════
async function initSeason(){
  document.getElementById('h-info').textContent='Fetching teams...';
  // Preserve palmares and old team names for migration
  const oldPalmares=[...palmares];
  const oldNames=allTeams.map(t=>t.name);

  try{
    const r=await fetch(CSV_URL);const text=await r.text();
    const data=parseCSV(text);
    if(!data||data.length<8){document.getElementById('h-info').textContent='⚠️ Not enough teams ('+((data||[]).length)+')';return}
    allTeams=data.map(t=>({...t,startValue:t.value}));
  }catch(e){document.getElementById('h-info').textContent='⚠️ Fetch failed';return}

  // Migrate palmares: if a team at same index changed name, update all string references
  if(oldNames.length===allTeams.length){
    const renames={};
    oldNames.forEach((old,i)=>{
      if(old&&allTeams[i].name!==old)renames[old]=allTeams[i].name;
    });
    if(Object.keys(renames).length>0){
      console.log('Name migrations:',renames);
      oldPalmares.forEach(p=>{
        if(renames[p.winnerName])p.winnerName=renames[p.winnerName];
        if(renames[p.runnerUpName])p.runnerUpName=renames[p.runnerUpName];
        if(renames[p.thirdName])p.thirdName=renames[p.thirdName];
        if(renames[p.hostName])p.hostName=renames[p.hostName];
      });
    }
  }

  tournaments=allTeams.map((t,i)=>{const tier=getTier(i+1);return{id:i,hostIdx:i,label:tier.label,css:tier.css,teamCount:tier.teamCount,days:tier.days,startDay:0,teams:[],bracket:[],results:{},winner:null,runnerUp:null,third:null,fourth:null,complete:false}});
  buildCalendar();
  currentDay=0;pts={};stats={};seasonDone=false;dayQueue=[];queuePos=0;daySimmed=false;h2h={};pendingExpansion=false;expansionMsg='';championships=[];
  // Preserve palmares across seasons, increment year
  palmares=oldPalmares;
  seasonYear=(seasonYear||0)+1;
  document.getElementById('h-info').textContent=`${allTeams.length} teams · ${tournaments.length} tournaments · Year ${seasonYear}`;
  saveState();renderAll();
}
function resetSeason(){
  palmares=[];seasonYear=0;h2h={};
  localStorage.removeItem(SAVE_KEY);localStorage.removeItem('sip_tourn_v2');localStorage.removeItem('sip_tournament_v1');
  initSeason();
}

// Sync names from live CSV (for mid-season fixes like renames)
async function syncNames(){
  try{
    const r=await fetch(CSV_URL);const text=await r.text();
    const data=parseCSV(text);
    if(!data||data.length!==allTeams.length)return;
    const renames={};
    allTeams.forEach((t,i)=>{
      if(data[i]&&data[i].name!==t.name){renames[t.name]=data[i].name;t.name=data[i].name}
    });
    if(Object.keys(renames).length>0){
      console.log('Synced names:',renames);
      palmares.forEach(p=>{
        if(renames[p.winnerName])p.winnerName=renames[p.winnerName];
        if(renames[p.runnerUpName])p.runnerUpName=renames[p.runnerUpName];
        if(renames[p.thirdName])p.thirdName=renames[p.thirdName];
        if(renames[p.hostName])p.hostName=renames[p.hostName];
      });
      // Also update match results in dayQueue
      dayQueue.forEach(q=>{
        if(q.result){
          q.result.n1=allTeams[q.result.a].name;
          q.result.n2=allTeams[q.result.b].name;
          q.result.wn=allTeams[q.result.winI].name;
          q.result.ln=allTeams[q.result.losI].name;
        }
      });
      saveState();renderAll();
      document.getElementById('h-info').textContent+=` · Names synced: ${Object.keys(renames).join(', ')}`;
    }
  }catch(e){}
}

function loadState(){try{const r=localStorage.getItem(SAVE_KEY);if(!r)return false;const s=JSON.parse(r);allTeams=s.allTeams||[];tournaments=s.tournaments||[];calendar=s.calendar||[];currentDay=s.currentDay||0;pts=s.pts||{};stats=s.stats||{};seasonDone=s.seasonDone||false;dayQueue=s.dayQueue||[];queuePos=s.queuePos||0;daySimmed=s.daySimmed||false;h2h=s.h2h||{};palmares=s.palmares||[];seasonYear=s.seasonYear||1;pendingExpansion=s.pendingExpansion||false;expansionMsg=s.expansionMsg||"";championships=s.championships||[];return allTeams.length>0}catch(e){return false}}

function renderSeason(){
  const el=document.getElementById('tab-season');
  let h='';
  h+=`<div class="controls">`;
  if(currentDay===0){
    h+=`<button class="btn" onclick="advanceDay()">▶ Start Season (${dayToDate(1)})</button>`;
  }else if(pendingExpansion){
    h+=`<button class="btn" onclick="checkExpansion()">📦 Check Expansion</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="skipExpansion()">Skip</button>`;
  }else if(seasonDone){
    h+=`<div class="banner banner-gold" style="margin:0">🏆 Season Complete!</div>`;
  }else if(!daySimmed){
    h+=`<button class="btn" onclick="playNextInQueue()">▶ Play Next Match</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="simRestOfDay();renderAll()">Sim Rest of Day</button>`;
  }else{
    h+=`<button class="btn" onclick="advanceDay()">▶ Next Day (${dayToDate(currentDay+1)})</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="for(let i=0;i<7&&!seasonDone&&!pendingExpansion;i++){advanceDay();if(!pendingExpansion&&!daySimmed)simRestOfDay()}renderAll()">+7 Days</button>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="for(let i=0;i<30&&!seasonDone&&!pendingExpansion;i++){advanceDay();if(!pendingExpansion&&!daySimmed)simRestOfDay()}renderAll()">+30 Days</button>`;
  }
  h+=`<span style="margin-left:auto;display:flex;gap:6px">`;
  if(seasonDone)h+=`<button class="btn btn-sm" onclick="initSeason()">New Season (Y${seasonYear+1})</button>`;
  h+=`<button class="btn btn-outline btn-sm" onclick="syncNames()">Sync Names</button>`;
  h+=`<button class="btn btn-reset btn-sm" onclick="if(confirm('Full reset? This clears all history.'))resetSeason()">Full Reset</button>`;
  h+=`</span>`;
  h+=`</div>`;

  // Expansion message
  if(expansionMsg)h+=`<div class="banner banner-gold">${expansionMsg}</div>`;



  if(currentDay>0){
    h+=`<div class="day-nav"><h2>${dayToDate(currentDay)}</h2><span class="day-badge">Day ${currentDay} · ${dayQueue.length} matches</span></div>`;

    // Group matches by tournament
    const byTourn=new Map();
    dayQueue.forEach((q,i)=>{if(!byTourn.has(q.tid))byTourn.set(q.tid,[]);byTourn.get(q.tid).push({...q,qIdx:i})});

    for(const[tid,matches]of byTourn){
      const isChamp=matches[0]?.isChamp;
      const t=isChamp?championships[matches[0].champIdx]:tournaments[tid];
      if(!t)continue;
      const host=allTeams[t.hostIdx];
      const thCls=isChamp?'th-gs':t.label==='Grand Slam'?'th-gs':t.label==='Level 2'?'th-l2':'th-lo';
      const dispLabel=isChamp?t.name:(t.label+' '+host.name);
      h+=`<div class="tourn-header-bar ${thCls}">
        <span class="th-name">${regBadge(host.comunidad)}<span class="tier-badge ${t.css}">${isChamp?'CHAMP':t.label}</span> ${isChamp?t.name:host.name}</span>
        <span class="th-meta">${t.actualTeams||t.teamCount} teams · ${matches[0].roundName}${t.complete?' · 🏆 '+allTeams[t.winner].name:''}</span>
      </div>`;

      matches.forEach(q=>{
        const isCur=!daySimmed&&q.qIdx===queuePos;
        const t1=allTeams[q.t1],t2=allTeams[q.t2];
        const tObj=isChamp?championships[q.champIdx]:tournaments[q.tid];
        const s1=tObj?.seedMap?.[q.t1];const s2=tObj?.seedMap?.[q.t2];
        const seed1=s1?`<span class="mono" style="font-size:.6rem;color:var(--gold);margin-right:3px">[${s1}]</span>`:'';
        const seed2=s2?`<span class="mono" style="font-size:.6rem;color:var(--gold);margin-left:3px">[${s2}]</span>`:'';
        const rec=getH2H(q.t1,q.t2);
        const h2hStr=rec?`<span class="mono" style="font-size:.62rem;color:var(--muted)">H2H: ${rec.aWins}-${rec.bWins}</span>`:`<span style="font-size:.62rem;color:var(--muted)">First meeting</span>`;
        if(q.result){
          const r=q.result;
          const w1=r.winI===q.t1;
          const recA=getH2H(q.t1,q.t2);
          const h2hA=recA?`H2H: ${recA.aWins}-${recA.bWins}`:'';
          h+=`<div class="match-card played-m fade-in" id="mq-${q.qIdx}">
            <div class="match-row">
              <div class="match-team"><div>
                <div class="mname">${seed1}${regBadge(t1.comunidad)}<span class="team-link" onclick="showTeamPalmares(${q.t1})">${r.n1}</span> ${w1?'<span class="winner-tag">W</span>':'<span class="loser-tag">L</span>'}</div>
                <div class="mval">${fmt(t1.value)}</div>
              </div></div>
              <div class="match-vs">${q.roundName}</div>
              <div class="match-team right"><div>
                <div class="mname">${!w1?'<span class="winner-tag">W</span> ':'<span class="loser-tag">L</span> '}<span class="team-link" onclick="showTeamPalmares(${q.t2})">${r.n2}</span>${regBadge(t2.comunidad)}${seed2}</div>
                <div class="mval">${fmt(t2.value)}</div>
              </div></div>
            </div>
            <div class="match-details">
              <span class="tag">Thr: <b>${r.thr}/200</b></span>
              <span class="tag">Roll: <b>${r.roll}</b></span>
              <span class="tag">${r.ww?'🎲 Upset':'📊'}</span>
              <span class="tag">${r.sb?'no steal':'<span style="color:var(--orange)">±'+fmt(r.stolen)+'</span>'}</span>
              ${r.homeBonus?'<span class="tag" style="color:var(--cyan)">🏠 '+r.homeBonus+'</span>':''}
              <span class="tag">${h2hA}</span>
            </div>
            ${q.winMsg?'<div style="padding:8px 16px;border-top:1px solid var(--border);font-weight:700;font-size:.82rem;color:'+(q.winMsg.includes('🏆')?'var(--gold)':q.winMsg.includes('🥉')?'var(--green)':'var(--text)')+'">'+q.winMsg+'</div>':''}
          </div>`;
        }else{
          h+=`<div class="match-card${isCur?' current-m':''}" id="mq-${q.qIdx}">
            <div style="padding:6px 16px 0">${h2hStr}</div>
            <div class="match-row">
              <div class="match-team"><div>
                <div class="mname">${seed1}${regBadge(t1.comunidad)}<span class="team-link" onclick="showTeamPalmares(${q.t1})">${t1.name}</span></div>
                <div class="mval">${fmt(t1.value)}</div>
              </div></div>
              <div class="match-vs">${isCur?'<span style="color:var(--gold)">NEXT</span>':q.roundName}</div>
              <div class="match-team right"><div>
                <div class="mname"><span class="team-link" onclick="showTeamPalmares(${q.t2})">${t2.name}</span>${regBadge(t2.comunidad)}${seed2}</div>
                <div class="mval">${fmt(t2.value)}</div>
              </div></div>
            </div>
            ${isCur?'<div style="padding:8px 16px;border-top:1px solid var(--border)"><button class="btn btn-sm" onclick="playNextInQueue()">▶ Play</button> <button class="btn btn-outline btn-sm" onclick="simRestOfDay();renderAll()">Sim All Today</button></div>':''}
          </div>`;
        }
      });
    }
  }

  el.innerHTML=h;
  // Auto-scroll
  if(dayQueue.length&&queuePos>0){
    requestAnimationFrame(()=>{
      const t=document.getElementById('mq-'+(queuePos<dayQueue.length?queuePos:queuePos-1));
      if(t)t.scrollIntoView({behavior:'smooth',block:'center'});
    });
  }
}

// RENDER: REGIONAL RANKINGS
// ═══════════════════════════════════════════════════════════════
function renderRegional(){
  const el=document.getElementById('tab-regional');
  let h='';

  // Build per-region and per-province points: who earned what IN tournaments hosted there
  const comPts={};  // {comunidad: {teamIdx: totalPts}}
  const provPts={}; // {provincia: {teamIdx: totalPts}}

  tournaments.filter(t=>t.complete).forEach(t=>{
    const host=allTeams[t.hostIdx];
    const com=host.comunidad, prov=host.provincia;
    if(!comPts[com])comPts[com]={};
    if(!provPts[prov])provPts[prov]={com};

    const p=PTS[t.label]||[10,5,3,2,1,0];
    const entries=[];
    if(t.winner!=null)entries.push([t.winner,p[0]]);
    if(t.runnerUp!=null)entries.push([t.runnerUp,p[1]]);
    if(t.third!=null)entries.push([t.third,p[2]]);
    if(t.fourth!=null)entries.push([t.fourth,p[3]]);
    const tr=t.teamCount===32?5:4;
    const qf=t.results[tr-3];
    if(qf)qf.forEach(m=>{if(m.losI!==t.third&&m.losI!==t.fourth)entries.push([m.losI,p[4]])});
    if(t.teamCount===32){const r16=t.results[0];if(r16)r16.forEach(m=>{entries.push([m.losI,p[5]])})}

    entries.forEach(([idx,ep])=>{
      if(!comPts[com])comPts[com]={};
      comPts[com][idx]=(comPts[com][idx]||0)+ep;
      if(!provPts[prov])provPts[prov]={com};
      if(!provPts[prov][idx])provPts[prov][idx]=0;
      provPts[prov][idx]+=ep;
    });
  });

  // Regional rankings
  h+=`<div class="section-title">Regional Rankings — points earned in each region's tournaments</div>`;
  const comList=Object.entries(comPts).sort((a,b)=>{
    const pa=Object.values(a[1]).reduce((s,v)=>s+v,0);
    const pb=Object.values(b[1]).reduce((s,v)=>s+v,0);
    return pb-pa;
  });
  comList.forEach(([com,teamMap])=>{
    const totalP=Object.values(teamMap).reduce((s,v)=>s+v,0);
    const sorted=Object.entries(teamMap).sort((a,b)=>b[1]-a[1]).slice(0,25);
    const tournCount=tournaments.filter(t=>t.complete&&allTeams[t.hostIdx].comunidad===com).length;
    h+=`<details style="margin-bottom:8px"><summary style="cursor:pointer;padding:6px 0;font-weight:600;font-size:.85rem">${comFlag(com)}${com} <span class="mono" style="font-size:.7rem;color:var(--gold)">${fmt(totalP)} pts</span> <span style="font-size:.7rem;color:var(--muted)">(${tournCount} tournaments)</span></summary>`;
    h+=`<table class="tbl"><thead><tr><th>#</th><th>Team</th><th>From</th><th>Pts in ${com}</th></tr></thead><tbody>`;
    sorted.forEach(([idx,ep],r)=>{
      const t=allTeams[idx];
      h+=`<tr><td class="pos">${r+1}</td><td style="font-weight:600">${regBadge(t.comunidad)}${t.name}</td>
        <td style="font-size:.72rem;color:var(--muted)">${t.comunidad}</td>
        <td class="mono" style="color:var(--gold)">${ep}</td></tr>`;
    });
    h+=`</tbody></table></details>`;
  });

  // Provincial rankings
  h+=`<div class="section-title">Provincial Rankings — points earned in each province's tournaments</div>`;
  const provList=Object.entries(provPts).filter(([,v])=>{
    const keys=Object.keys(v).filter(k=>k!=='com');
    return keys.length>0;
  }).sort((a,b)=>{
    const pa=Object.entries(a[1]).filter(([k])=>k!=='com').reduce((s,[,v])=>s+v,0);
    const pb=Object.entries(b[1]).filter(([k])=>k!=='com').reduce((s,[,v])=>s+v,0);
    return pb-pa;
  });
  provList.forEach(([prov,data])=>{
    const com=data.com||'';
    const entries=Object.entries(data).filter(([k])=>k!=='com');
    const totalP=entries.reduce((s,[,v])=>s+v,0);
    const sorted=entries.sort((a,b)=>b[1]-a[1]).slice(0,20);
    const tournCount=tournaments.filter(t=>t.complete&&allTeams[t.hostIdx].provincia===prov).length;
    h+=`<details style="margin-bottom:6px"><summary style="cursor:pointer;padding:4px 0;font-size:.82rem">${regBadge(com)}${prov} <span class="mono" style="font-size:.68rem;color:var(--gold)">${fmt(totalP)} pts</span> <span style="font-size:.68rem;color:var(--muted)">(${tournCount} tourn.)</span></summary>`;
    h+=`<table class="tbl"><thead><tr><th>#</th><th>Team</th><th>From</th><th>Pts in ${prov}</th></tr></thead><tbody>`;
    sorted.forEach(([idx,ep],r)=>{
      const t=allTeams[idx];
      h+=`<tr><td class="pos">${r+1}</td><td style="font-weight:600">${regBadge(t.comunidad)}${t.name}</td>
        <td style="font-size:.72rem;color:var(--muted)">${t.comunidad}</td>
        <td class="mono" style="color:var(--gold)">${ep}</td></tr>`;
    });
    h+=`</tbody></table></details>`;
  });

  if(!comList.length)h+=`<p style="color:var(--muted);text-align:center;padding:20px">No tournaments completed yet.</p>`;
  el.innerHTML=h;
}

function renderTeamsTab(){
  const el=document.getElementById('tab-teams');
  const sorted=[...allTeams.keys()].sort((a,b)=>allTeams[b].value-allTeams[a].value);
  let h=`<div class="section-title">All Teams (${allTeams.length})</div>`;
  h+=`<table class="tbl"><thead><tr><th>#</th><th>Team</th><th>Comunidad</th><th>Provincia</th><th>Value</th><th>Δ</th><th>Hosts</th></tr></thead><tbody>`;
  sorted.slice(0,100).forEach((i,r)=>{
    const t=allTeams[i],d=t.value-t.startValue;
    const tier=getTier(i+1);
    h+=`<tr><td class="pos">${r+1}</td><td style="font-weight:600;cursor:pointer" onclick="showTeamPalmares(${i})">${regBadge(t.comunidad)}${t.name}</td>
      <td style="font-size:.72rem;color:var(--muted)">${t.comunidad}</td>
      <td style="font-size:.72rem;color:var(--muted)">${t.provincia}</td>
      <td class="val">${fmt(t.value)}</td>
      <td class="mono ${d>=0?'delta-pos':'delta-neg'}" style="font-size:.7rem">${d>=0?'+':''}${fmt(d)}</td>
      <td><span class="tier-badge ${tier.css}">${tier.label}</span></td></tr>`;
  });
  h+=`</tbody></table>`;
  if(allTeams.length>100)h+=`<div style="font-size:.72rem;color:var(--muted);margin-top:6px">Top 100 of ${allTeams.length}</div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: HISTORY (all-time palmares)
// ═══════════════════════════════════════════════════════════════
function renderHistory(){
  const el=document.getElementById('tab-history');
  if(!palmares.length){el.innerHTML=`<p style="color:var(--muted);text-align:center;padding:30px">No tournaments completed yet.</p>`;return}

  let h='';
  // Group by tier
  const tiers=['Grand Slam','Level 2','Level 3','Level 4','Level 5','Level 6','Level 7','Level 8'];
  tiers.forEach(tier=>{
    const entries=palmares.filter(p=>p.label===tier);
    if(!entries.length)return;
    const css=entries[0].css;
    h+=`<div class="section-title"><span class="tier-badge ${css}" style="margin-right:6px">${tier}</span> ${entries.length} tournaments</div>`;
    h+=`<table class="tbl"><thead><tr><th>Yr</th><th>Tournament</th><th>🥇 Winner</th><th>🥈 Runner-Up</th><th>🥉 Third</th></tr></thead><tbody>`;
    entries.forEach(p=>{
      h+=`<tr>
        <td class="mono" style="color:var(--muted)">${p.year}</td>
        <td>${regBadge(p.hostCom)}<b>${p.hostName}</b></td>
        <td style="font-weight:600;color:var(--gold)">${regBadge(p.winnerCom)}${p.winnerName}</td>
        <td>${p.runnerUpName||'—'}</td>
        <td>${p.thirdName||'—'}</td>
      </tr>`;
    });
    h+=`</tbody></table>`;
  });

  // Win counts summary
  h+=`<div class="section-title">All-Time Winners</div>`;
  const winCounts={};
  palmares.forEach(p=>{
    if(!winCounts[p.winnerName])winCounts[p.winnerName]={wins:0,com:p.winnerCom,gs:0,l2:0,other:0};
    winCounts[p.winnerName].wins++;
    if(p.label==='Grand Slam')winCounts[p.winnerName].gs++;
    else if(p.label==='Level 2')winCounts[p.winnerName].l2++;
    else winCounts[p.winnerName].other++;
  });
  const sorted=Object.entries(winCounts).sort((a,b)=>b[1].wins-a[1].wins||(b[1].gs-a[1].gs)||(b[1].l2-a[1].l2));
  h+=`<table class="tbl"><thead><tr><th>#</th><th>Team</th><th>Total</th><th>GS</th><th>L2</th><th>Other</th></tr></thead><tbody>`;
  sorted.slice(0,50).forEach(([name,d],i)=>{
    h+=`<tr><td class="pos">${i+1}</td><td style="font-weight:600">${regBadge(d.com)}${name}</td>
      <td class="mono" style="color:var(--gold)">${d.wins}</td>
      <td class="mono">${d.gs||''}</td><td class="mono">${d.l2||''}</td><td class="mono" style="color:var(--muted)">${d.other||''}</td></tr>`;
  });
  h+=`</tbody></table>`;

  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════
// TEAM PALMARES MODAL
// ═══════════════════════════════════════════════════════════════
function showTeamPalmares(tIdx){
  const t=allTeams[tIdx];
  const s=stats[tIdx]||{};
  const ranked=getRanked();
  const rank=ranked.indexOf(tIdx)+1;
  const tier=getTier(tIdx+1);

  document.getElementById('modal-title').innerHTML=`${regBadge(t.comunidad)}${t.name}`;

  let h='';
  // Header info
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Ranking</div>
      <div style="font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--gold)">#${rank}</div>
      <div style="font-family:var(--mono);font-size:.8rem;color:var(--muted)">${pts[tIdx]||0} pts</div>
    </div>
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Value</div>
      <div style="font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--gold)">${fmt(t.value)}</div>
      <div style="font-family:var(--mono);font-size:.75rem;color:${t.value>=t.startValue?'var(--green)':'var(--red-bright)'}">${t.value>=t.startValue?'+':''}${fmt(t.value-t.startValue)}</div>
    </div>
  </div>`;

  h+=`<div style="display:flex;gap:16px;margin-bottom:16px;font-size:.82rem">
    <span>${t.comunidad} · ${t.provincia}</span>
    <span class="tier-badge ${tier.css}">${tier.label} host</span>
  </div>`;

  // Stats
  h+=`<div style="display:flex;gap:20px;margin-bottom:18px;font-family:var(--mono);font-size:.8rem">
    <span style="color:var(--green)">${s.wins||0}W</span>
    <span style="color:var(--red-bright)">${s.losses||0}L</span>
    <span style="color:var(--muted)">${s.tp||0} tournaments</span>
  </div>`;

  // Medals from palmares
  const golds=palmares.filter(p=>p.winnerName===t.name);
  const silvers=palmares.filter(p=>p.runnerUpName===t.name);
  const bronzes=palmares.filter(p=>p.thirdName===t.name);

  if(golds.length+silvers.length+bronzes.length>0){
    h+=`<div style="display:flex;gap:16px;margin-bottom:16px;font-size:.9rem;font-weight:700">
      ${golds.length?'<span style="color:var(--gold)">🥇 '+golds.length+'</span>':''}
      ${silvers.length?'<span style="color:var(--muted)">🥈 '+silvers.length+'</span>':''}
      ${bronzes.length?'<span style="color:#cd7f32">🥉 '+bronzes.length+'</span>':''}
    </div>`;

    // Gold medals
    if(golds.length){
      h+=`<div style="font-size:.68rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin:12px 0 6px;font-weight:700">🥇 Gold Medals (${golds.length})</div>`;
      golds.forEach(p=>{
        h+=`<div class="medal-row"><span class="medal-icon">🥇</span><span><span class="medal-tourn">${p.hostName}</span> <span class="tier-badge ${p.css}" style="font-size:.5rem;padding:1px 4px">${p.label}</span><br><span class="medal-host">Year ${p.year}</span></span></div>`;
      });
    }
    // Silver
    if(silvers.length){
      h+=`<div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:12px 0 6px;font-weight:700">🥈 Silver Medals (${silvers.length})</div>`;
      silvers.forEach(p=>{
        h+=`<div class="medal-row"><span class="medal-icon">🥈</span><span><span class="medal-tourn">${p.hostName}</span> <span class="tier-badge ${p.css}" style="font-size:.5rem;padding:1px 4px">${p.label}</span><br><span class="medal-host">Year ${p.year}</span></span></div>`;
      });
    }
    // Bronze
    if(bronzes.length){
      h+=`<div style="font-size:.68rem;color:#cd7f32;text-transform:uppercase;letter-spacing:1.5px;margin:12px 0 6px;font-weight:700">🥉 Bronze Medals (${bronzes.length})</div>`;
      bronzes.forEach(p=>{
        h+=`<div class="medal-row"><span class="medal-icon">🥉</span><span><span class="medal-tourn">${p.hostName}</span> <span class="tier-badge ${p.css}" style="font-size:.5rem;padding:1px 4px">${p.label}</span><br><span class="medal-host">Year ${p.year}</span></span></div>`;
      });
    }
  }else{
    h+=`<div style="color:var(--muted);font-size:.82rem;padding:12px 0">No medals yet this season.</div>`;
  }

  // Head-to-head records (top rivals)
  const rivals=[];
  Object.entries(h2h).forEach(([key,rec])=>{
    const[a,b]=key.split('-').map(Number);
    if(a===tIdx||b===tIdx){
      const opp=a===tIdx?b:a;
      const myWins=a===tIdx?rec[0]:rec[1];
      const theirWins=a===tIdx?rec[1]:rec[0];
      rivals.push({opp,myWins,theirWins,total:myWins+theirWins});
    }
  });
  rivals.sort((a,b)=>b.total-a.total);

  if(rivals.length){
    h+=`<div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;font-weight:700">Head-to-Head (${rivals.length} opponents)</div>`;
    h+=`<table class="tbl"><thead><tr><th>Opponent</th><th>W</th><th>L</th><th>Total</th></tr></thead><tbody>`;
    rivals.slice(0,20).forEach(r=>{
      const o=allTeams[r.opp];
      h+=`<tr><td style="font-weight:600;cursor:pointer" onclick="showTeamPalmares(${r.opp})">${regBadge(o.comunidad)}${o.name}</td>
        <td class="mono" style="color:var(--green)">${r.myWins}</td>
        <td class="mono" style="color:var(--red-bright)">${r.theirWins}</td>
        <td class="mono" style="color:var(--muted)">${r.total}</td></tr>`;
    });
    h+=`</tbody></table>`;
  }

  document.getElementById('modal-body').innerHTML=h;
  document.getElementById('team-modal').classList.add('open');
}

function closeModal(){document.getElementById('team-modal').classList.remove('open')}

// Make team names clickable — helper that wraps name in a link
function teamLink(tIdx,name){
  return`<span class="team-link" onclick="showTeamPalmares(${tIdx})">${name}</span>`;
}
